  },
  uploadPhoto(hid){
    const inp=el('input');inp.type='file';inp.accept='image/*';
    inp.onchange=()=>{const f=inp.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=()=>{const img=new Image();img.onload=async()=>{
        const S=256,c=el('canvas');c.width=S;c.height=S;const x=c.getContext('2d');
        const sc=Math.max(S/img.width,S/img.height),w=img.width*sc,hh=img.height*sc;
        x.drawImage(img,(S-w)/2,(S-hh)/2,w,hh);
        const h=State.horses.find(z=>z.id===hid);h.photo=c.toDataURL('image/jpeg',0.82);
        await DB.put('horses',h);Toast.show('Foto gespeichert','ok');Nav.refresh();
      };img.src=r.result;};
      r.readAsDataURL(f);};
    inp.click();
  },
  async removePhoto(hid){const h=State.horses.find(z=>z.id===hid);delete h.photo;await DB.put('horses',h);Toast.show('Foto entfernt','info');Nav.refresh();},
  kpiGo(k){
    if(k==='crit'){Views._rosterFilter='crit';Views._rosterSort='urgency';Views._rosterMode='list';Nav.go('roster');}
    else if(k==='visit'){Nav.go('today');}
    else if(k==='horses'){Views._rosterFilter='all';Views._rosterSort='name';Views._rosterMode='list';Nav.go('roster');}
    else{Views._rosterFilter='all';Views._rosterSort='recent';Views._rosterMode='list';Nav.go('roster');}
  },
  // ══ HEUTE · Tages-Cockpit ══ der 10X-Moment für gehetzte Vets
  today(){
    let order=Dispatch.optimize();                 // [{h,tri,dist}] triage-prio + nearest-neighbor
    const now=new Date();
    const dayVal=now.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
    // Tagesfortschritt: heute erledigte Stopps
    const doneToday=State.horses.filter(h=>h.visitDoneAt && new Date(h.visitDoneAt).toDateString()===now.toDateString()).length;
    const totalToday=order.length+doneToday;
    const progPct=totalToday?Math.round(doneToday/totalToday*100):0;
    const progress=totalToday?`<div class="today-progress"><div class="tp-bar"><i style="width:${progPct}%"></i></div><span class="tp-lbl">${doneToday}/${totalToday} erledigt</span></div>`:'';
    const origin={lat:State.settings.originLat,lng:State.settings.originLng};
    const optimalKm=order.reduce((s,x)=>s+x.dist,0);
    // Manuelle Umplanung (Drag&Drop) anwenden — gilt nur für heute
    let manual=false;
    const mr=State.settings.manualRoute;
    if(mr && mr.date===now.toDateString() && Array.isArray(mr.ids)){
      const byId={}; order.forEach(x=>byId[x.h.id]=x);
      const seq=mr.ids.filter(id=>byId[id]).map(id=>byId[id]);
      const rest=order.filter(x=>!mr.ids.includes(x.h.id));
      if(seq.length){ order=[...seq,...rest]; manual=true;
        let cur=origin; order.forEach(x=>{x.dist=haversine(cur,{lat:x.h.lat,lng:x.h.lng}); cur={lat:x.h.lat,lng:x.h.lng};});
      }
    }
    Dispatch._order=order;   // Maps-Handoff nutzt die angezeigte (ggf. manuelle) Reihenfolge
    const manualDelta=manual?Math.max(0,order.reduce((s,x)=>s+x.dist,0)-optimalKm):0;
    const optKm=order.reduce((s,x)=>s+x.dist,0);
    // Ehrliche Ersparnis: optimierte Route vs. dieselben Stopps unsortiert (alphabetisch) ab Praxis
    let savedKm=0;
    if(order.length>1){
      const naive=[...order].sort((a,b)=>(a.h.name||'').localeCompare(b.h.name||''));
      let cur=origin,nd=0; naive.forEach(x=>{nd+=haversine(cur,{lat:x.h.lat,lng:x.h.lng});cur={lat:x.h.lat,lng:x.h.lng};});
      savedKm=Math.max(0,nd-optKm);
    }
    const savedMin=Math.round(savedKm/45*60);      // ~45 km/h Landstraße
    const noLoc=State.horses.filter(h=>h.needsVisit&&(h.lat==null||h.lng==null));
    const critCount=order.filter(x=>x.tri.level==='crit').length;
    // Stall-Cluster: mehrere Pferde am selben Ort = Sammelbesuch
    const placeCount={}; order.forEach(x=>{const p=(x.h.place||x.h.stable||'').trim(); if(p)placeCount[p]=(placeCount[p]||0)+1;});
    const clusters=Object.entries(placeCount).filter(([,n])=>n>1);
    const rationale=[]; if(critCount)rationale.push(critCount>1?`${critCount} kritische Fälle zuerst`:'1 kritischer Fall zuerst');
    clusters.forEach(([p,n])=>rationale.push(`Sammelbesuch ${p} (${n})`));
    const why=`<div class="today-why">${rationale.length?`<span class="rz"><span class="dot">◆</span> Reihenfolge: ${rationale.map(esc).join(' · ')}</span>`:'<span></span>'}<span class="off"><span class="d"></span> Offline-fähig · lokal gesichert</span></div>`;

    if(!order.length && !noLoc.length){
      const doneMsg=doneToday>0?`<div class="today-empty"><div style="color:var(--good);margin-bottom:10px" class="done-check">${IC.checkCircle}</div><div style="font-size:16px;color:var(--good);font-weight:600;margin-bottom:6px">Tag geschafft — alle ${doneToday} Besuche erledigt</div><div style="font-size:12.5px;max-width:340px;margin:0 auto">Neue Besuche markierst du im Board/Liste oder schiebst einen Analog-Patienten ein.</div><div style="margin-top:20px"><button class="btn primary" onclick="Views.insertAnalog()">+ Analog-Patient einschieben</button></div></div>`
        :`<div class="today-empty">${IC.route}<div style="font-size:14px;margin:12px 0 6px;color:var(--text-secondary)">Kein Besuch für heute markiert.</div>
        <div style="font-size:12.5px;max-width:340px;margin:0 auto">Markiere Pferde im Board oder in der Liste als „Besuch fällig" — oder schiebe einen Analog-Patienten (ohne H10) direkt ein.</div>
        <div style="margin-top:20px"><button class="btn primary" onclick="Views.insertAnalog()">+ Analog-Patient einschieben</button></div></div>`;
      return `<div class="view"><div class="view-head"><div><span class="eyebrow">Field-Ops${doneToday?` · ${doneToday} erledigt`:''}</span><h1>Heute</h1></div></div>${doneMsg}</div>`;
    }

    const driveMin=Math.round(optKm/45*60);            // reine Fahrzeit ~45 km/h
    const dayMin=driveMin+order.length*20;             // + ~20 min je Besuch
    const dayStr=dayMin>=60?(dayMin/60).toFixed(1).replace('.',',')+' h':dayMin+' min';
    const nextStop=order[0]?order[0].h:null;
    const hero=`<div class="today-hero">
      <div class="th-top">
        <div class="day"><div class="lbl">Einsatzplan · ${esc(dayVal)}</div>${nextStop?`<div class="val">Zuerst: ${esc(nextStop.name)}${order[0].dist!=null?` · ${fmt1(order[0].dist)} km`:''}</div>`:'<div class="val">Kein Besuch</div>'}</div>
        ${savedKm>0?`<div class="th-saved" title="gespart ggü. unsortierter Fahrt durch Triage-Priorisierung">${IC.bolt}<span>${fmt0(savedKm)} km gespart</span></div>`:''}
      </div>
      <div class="th-stats">
        <div class="ths"><b>${order.length}</b><span>Stopp${order.length>1?'s':''}</span></div>
        <div class="ths"><b>${fmt0(optKm)}<small> km</small></b><span>Fahrstrecke</span></div>
        <div class="ths"><b>~${dayStr}</b><span>Tagesdauer</span></div>
        <div class="ths${critCount?' crit':''}"><b>${critCount}</b><span>kritisch</span></div>
      </div>
    </div>`;

    const noLocHtml=noLoc.length?`<div class="chip amber" style="display:block;margin:2px 0 12px">${IC.warn} ${noLoc.length} Besuch${noLoc.length>1?'e':''} ohne Standort — Ort in der Akte ergänzen: ${noLoc.map(h=>esc(h.name)).join(', ')}</div>`:'';

    const sch=Dispatch.schedule(order); const srows=sch.rows;
    const stops=order.map((x,i)=>{
      const h=x.h, lvl=x.tri.level, lbl=Triage.LEVELS[lvl].label; const r=srows[i];
      const flag=(x.tri.flags&&x.tri.flags[0])?`<div class="tflag">${IC.warn} ${esc(x.tri.flags[0])}</div>`:'';
      return `<div class="tstop ${lvl}${r.lateBy?' late':''}" data-sort="${h.id}" data-eta="${r.arrive}" data-depart="${r.depart}" data-arrived="${h.arrivedAt?'1':'0'}">
        <div class="tdrag" title="Ziehen zum Umsortieren">${IC.grip}</div>
        <div class="tl"><div class="tord">${i+1}</div></div>
        <div class="tmain">
          <div class="ttime"><b class="${r.lateBy?'late':''}">${fmtTime(r.arrive)}</b><span>${i===0?'ab Praxis':(r.driveMin?IC.nav+r.driveMin+'′':'gleicher Stall')}</span></div>
          <div class="tname">${esc(h.name)}<span class="tsev">${lbl}</span>${h.analog?'<span class="tsev" style="background:var(--bg-elev);color:var(--text-dim)">analog</span>':''}</div>
          <div class="tmeta">${esc(h.stable||(h.place?h.place.split(',').pop().trim():'—'))}${placeCount[(h.place||h.stable||'').trim()]>1?' <b style="color:var(--cyan-strong);font-weight:600">· Sammelstall</b>':''} · ${fmt1(x.dist)} km</div>
          ${h.place?`<button class="taddr" onclick="event.stopPropagation();Dispatch.navTo('${h.id}')" title="In Navigation öffnen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg><span>${esc(h.place)}</span><em>${IC.nav}Navi</em></button>`:`<button class="taddr missing" onclick="event.stopPropagation();Views.openHorse('${h.id}')">${IC.warn}<span>Adresse fehlt — ergänzen</span></button>`}
          ${h.owner||h.phone?`<div class="towner">${IC.owner}<span class="tow-txt"><b>${esc(h.owner||'—')}</b>${h.phone?`<em>${esc(h.phone)}</em>`:''}</span></div>`:''}
          ${r.lateBy?`<div class="twarn">${IC.warn} ${r.lateBy} min nach Termin ${fmtTime(r.appt)}<button class="twarn-btn" onclick="event.stopPropagation();Views.notifyDelay('${h.id}',${r.arrive})">${IC.phone}Halter benachrichtigen</button></div>`:(r.wait?`<div class="tbuffer">${IC.clock} ${r.wait} min Puffer bis Termin ${fmtTime(r.appt)}</div>`:'')}
          ${flag}
          ${h.arrivedAt?`<div class="tarrived">${IC.check} angekommen ${fmtTime(new Date(h.arrivedAt).getHours()*60+new Date(h.arrivedAt).getMinutes())} — Behandlung läuft</div>`:''}
          <div class="tsched">
            <span class="tvisit"><button onclick="event.stopPropagation();Views.setVisit('${h.id}',-5)">−</button><b>${IC.clock}${r.visitMin} min</b><button onclick="event.stopPropagation();Views.setVisit('${h.id}',5)">+</button></span>

  reschedule(id,ev){
    const h=State.horses.find(x=>x.id===id); if(!h)return;
    const btn=ev&&ev.currentTarget;
    const remove=()=>{
      h.needsVisit=false; DB.put('horses',h); Nav.refresh();
      Toast.show(`${h.name} nicht heute`,'info',{label:'Rückgängig',fn:()=>{h.needsVisit=true;DB.put('horses',h);Nav.refresh();Toast.show(`${h.name} wieder in der Route`,'ok');}});
    };
    if(!btn){ remove(); return; }
    if(btn.dataset.armed==='1'){ clearTimeout(btn._t); remove(); return; }
    btn.dataset.armed='1'; btn.classList.add('armed');
    btn.innerHTML=`${IC.warn}Wirklich raus?`;
    btn._t=setTimeout(()=>{ if(!btn.isConnected)return; btn.dataset.armed=''; btn.classList.remove('armed'); btn.innerHTML=`${IC.clock}Nicht heute`; },3200);

  async completeStop(id){
    const h=State.horses.find(x=>x.id===id); if(!h)return;
    const now=new Date();
    // Fahrsegment aus der aktuellen Planung (für Fahrtenbuch)
    let row=null; try{ const pd=Dispatch.plannedDay(); const idx=pd.order.findIndex(x=>x.h.id===id); if(idx>=0)row=pd.sch.rows[idx]; }catch(e){}
    const arrivedAt=h.arrivedAt?new Date(h.arrivedAt):null;
    const treatmentMin=arrivedAt?Math.max(1,Math.round((now-arrivedAt)/60000)):(row?row.visitMin:(State.settings.defaultVisitMin||20));
    const lvl=(State.latestFor(id)&&State.latestFor(id).triage&&State.latestFor(id).triage.level)||h.manualLevel||'watch';
    const entry={
      id:'log:'+now.toISOString().slice(0,10)+':'+id+':'+now.getTime(),
      date:now.toISOString().slice(0,10), horseId:id, horseName:h.name,
      owner:h.owner||'', place:h.place||h.stable||'',
      arriveAt:arrivedAt?arrivedAt.toISOString():null, departAt:now.toISOString(),
      treatmentMin, driveKm:row?Math.round((row.dist||0)*10)/10:null, driveMin:row?row.driveMin:null,
      triageLevel:lvl, estimated:!arrivedAt
    };
    await DB.put('settings',entry); State.daylog.push(entry);
    delete h.arrivedAt; h.needsVisit=false; h.visitDoneAt=now.toISOString(); await DB.put('horses',h);

  shareLocation(phone){
    if(!navigator.geolocation){ Toast.show('Standort nicht verfügbar','warn'); return; }
    Toast.show('Standort wird ermittelt…','info');
    navigator.geolocation.getCurrentPosition(pos=>{
      const {latitude:la,longitude:lo}=pos.coords;
      const link=`https://maps.google.com/?q=${la.toFixed(5)},${lo.toFixed(5)}`;
      const txt=encodeURIComponent(`Mein aktueller Standort: ${link}`);
      const p=(phone||'').replace(/[^0-9+]/g,'');
      if(p){ const wp=p.replace(/^\+/,'').replace(/^0/,'49'); window.open(`https://wa.me/${wp}?text=${txt}`,'_blank'); }
      else { navigator.clipboard&&navigator.clipboard.writeText(link); Toast.show('Standort-Link kopiert','ok'); }
    },()=>Toast.show('Standort-Freigabe abgelehnt','warn'),{enableHighAccuracy:true,timeout:8000});

  // Live-Zeitschiene: positioniert die JETZT-Linie, markiert nächsten/überfälligen Stopp, Plan-Status
  tickTimeline(){
    const cont=document.getElementById('todayStops'); if(!cont)return;
    const line=document.getElementById('nowLine');
    const now=new Date(); const nowMin=now.getHours()*60+now.getMinutes();
    const stops=[...cont.querySelectorAll('.tstop')];
    if(!stops.length){ if(line)line.style.display='none'; return; }
    let overdue=0, arrivedNow=false;
    stops.forEach(s=>{
      s.classList.remove('next','overdue');
      const eta=+s.dataset.eta, arrived=s.dataset.arrived==='1';
      if(arrived) arrivedNow=true;
      if(!arrived && eta<nowMin){ s.classList.add('overdue'); overdue++; }
    });
    const next=stops.find(s=>s.dataset.arrived!=='1'); if(next)next.classList.add('next');
    if(line){
      line.style.display='';
      const target=stops.find(s=>+s.dataset.eta>=nowMin);
      if(target){ if(line.nextSibling!==target)cont.insertBefore(line,target); }
      else cont.appendChild(line);
      const tl=line.querySelector('.nl-time'); if(tl)tl.textContent=fmtTime(nowMin);
    }
    const st=document.getElementById('nowStatus');
    if(st){
      if(!next){ st.className='tt-plan ok'; st.innerHTML=`${IC.check} Tag geschafft`; }
      else if(overdue){ st.className='tt-plan behind'; st.innerHTML=`${IC.warn} ${overdue} hinter Plan`; }
      else { st.className='tt-plan ok'; st.innerHTML=`${IC.check} im Plan`; }
    }
  },

    const name=($('#anName').value||'').trim(); if(!name){Toast.show('Bitte Name eingeben','warn');return;}

  ownerFeedback(hid){
    if(!License.gate('ownerFeedback','Besitzer-Rückmeldung'))return;
    const h=State.horses.find(x=>x.id===hid);const recs=State.recsFor(hid);const rec=recs[recs.length-1];
    if(!rec){Toast.show('Keine Aufnahme vorhanden','warn');return;}
    const m=rec.metrics;const tri=rec.triage;const tr=Triage.trend(hid);
    const lvl={crit:`zeigt in dieser Messung auffällige Werte, die zeitnah tierärztlich abgeklärt werden sollten`,
      elev:`zeigt leicht erhöhte Belastungszeichen, die wir im Blick behalten sollten`,
      watch:`ist weitgehend unauffällig — einzelne Werte beobachten wir weiter`,
      stable:`zeigt einen stabilen, entspannten Herzrhythmus`}[tri.level];
    const trend=tr?(tr.dir==='up'?'Erfreulich: Der Verlauf verbessert sich gegenüber der letzten Messung.':tr.dir==='down'?'Hinweis: Der Verlauf zeigt eine Verschlechterung gegenüber der letzten Messung.':'Der Verlauf ist stabil.'):'';
    const empf={crit:'Bitte vereinbaren Sie zeitnah einen Termin zur klinischen Untersuchung.',
      elev:'Wir empfehlen eine Kontrollmessung in den nächsten Tagen.',
      watch:'Eine erneute Messung in der kommenden Woche gibt zusätzliche Sicherheit.',
      stable:'Weiter so — regelmäßige Messungen helfen, Veränderungen früh zu erkennen.'}[tri.level];
    const anrede=h.owner?' '+h.owner.split(' ').slice(-1)[0]:'';
    let txt=`Hallo${anrede},\n\nvielen Dank für die Herzraten-Aufnahme von ${h.name} vom ${fmtDate(rec.startedAt)}.\n\n`+
      `Zusammenfassung: ${h.name} ${lvl}.\n\nKennwerte dieser Messung:\n`+
      `• Herzratenvariabilität (RMSSD): ${fmt0(m.rmssd)} ms\n`+
      `• Ruhe-Herzfrequenz: ${fmt0(m.meanHR)} bpm\n`+
      (m.sdnn?`• Gesamtvariabilität (SDNN): ${fmt0(m.sdnn)} ms\n`:'')+
      (trend?`\n${trend}\n`:'')+
      `\nEmpfehlung: ${empf}\n\n`+
      `Diese Einschätzung basiert auf der Herzratenvariabilität und ersetzt keine tierärztliche Diagnose.\n\n`+
      `Herzliche Grüße\n${State.settings.vetName||State.settings.clinicName||''}`;
    UI.modal(`<div class="modal-head"><button class="closex" onclick="UI.closeModal()">${IC.x}</button><h3>Rückmeldung an Besitzer</h3></div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">Fertiger, besitzerfreundlicher Befundtext für ${esc(h.name)}. Frei editierbar.</p>

    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="UI.closeModal()">Schließen</button>
      <button class="btn ghost" onclick="Views.mailOwner('${hid}')">Per E-Mail</button>

    </div>`);

        <div class="field"><label>Telefon</label><input id="ePhone" value="${esc(h.phone||'')}"></div></div>
      <div class="field-row"><div class="field"><label>Stall</label><input id="eStable" value="${esc(h.stable||'')}"></div>
        <div class="field"><label>Ort / Adresse</label>
          <div style="display:flex;gap:6px"><input id="ePlace" value="${esc(h.place||'')}" placeholder="Stalladresse" style="flex:1">
          <button class="btn ghost" style="padding:0 12px" onclick="geoLookup('ePlace','eLat','eLng',this)" title="Koordinaten aus Adresse ermitteln">${IC.pin}</button></div></div></div>
      <div class="field-row"><div class="field"><label>Breitengrad</label><input id="eLat" type="number" step="0.00001" value="${h.lat??''}"><div class="hint">Für die Kartenroute (füllt automatisch aus der Adresse)</div></div>
        <div class="field"><label>Längengrad</label><input id="eLng" type="number" step="0.00001" value="${h.lng??''}"></div></div>
    </div>
    <div class="modal-foot">${!isNew?`<button class="btn ghost" style="margin-right:auto;color:var(--red)" onclick="Views.delHorse('${id}')">Pferd löschen</button>`:''}<button class="btn ghost" onclick="UI.closeModal()">Abbrechen</button><button class="btn primary" onclick="Views.saveHorse('${id||''}')">Speichern</button></div>`);
  },
  async saveHorse(id){
    let h=id?State.horses.find(x=>x.id===id):{id:'h_manual_'+Math.abs(hashStr('m'+performance.now())).toString(36),subjectId:'manual:'+performance.now(),createdAt:new Date().toISOString(),needsVisit:false};
    h.name=$('#eName').value||'Unbenannt';h.breed=$('#eBreed').value;h.owner=$('#eOwner').value;h.phone=$('#ePhone').value;
    h.stable=$('#eStable').value;h.place=$('#ePlace').value;h.lat=num($('#eLat').value);h.lng=num($('#eLng').value);
    await DB.put('horses',h);if(!id)State.horses.push(h);UI.closeModal();Toast.show('Gespeichert','ok');Nav.refresh();
  },
  async delHorse(id){if(!confirm('Pferd inkl. aller Aufnahmen löschen?'))return;
    await DB.del('horses',id);for(const r of State.recsFor(id))await DB.del('recordings',r.id);
    State.horses=State.horses.filter(x=>x.id!==id);State.recordings=State.recordings.filter(x=>x.horseId!==id);
    UI.closeModal();Toast.show('Pferd gelöscht','info');Nav.go('roster');
  },
  _detailId:null,
};

/* ════════════════════════════════════════════════════════════════════════
   DISPATCH — Routenoptimierung + Google-Maps-Übergabe
   ════════════════════════════════════════════════════════════════════════ */
const Dispatch={
  _map:null,_layer:null,_order:[],
  ROAD_FACTOR:1.32,   // Luftlinie→Straße: typischer Umwegfaktor Regionalfahrt (haversine unterschätzt real ~30 %)
  visitHorses(){
    return State.horses.filter(h=>h.needsVisit && h.lat!=null && h.lng!=null).map(h=>{
      const rec=State.latestFor(h.id);
      // Analog-Patienten (ohne H10-Aufnahme) nach manuell gesetzter Dringlichkeit einsortieren
      const tri=rec?rec.triage:{level:(h.manualLevel||'watch'),flags:[],reasons:[]};
      return {h,tri};});
  },
  navTo(id){
    const h=State.horses.find(x=>x.id===id);
    if(!h||h.lat==null||h.lng==null){Toast.show('Kein Standort hinterlegt — in der Akte ergänzen','warn');return;}
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lng}&travelmode=driving`,'_blank');
  },
  optimize(){
    const origin={lat:State.settings.originLat,lng:State.settings.originLng};
    let pool=this.visitHorses();
    const order=[];let cur=origin;
    // Priorität zuerst (crit>elev>watch>stable), innerhalb Stufe nearest-neighbor
    while(pool.length){
      const topRank=Math.max(...pool.map(x=>Triage.LEVELS[x.tri.level].rank));
      const tier=pool.filter(x=>Triage.LEVELS[x.tri.level].rank===topRank);
      let best=null,bd=Infinity;
      for(const x of tier){const d=haversine(cur,{lat:x.h.lat,lng:x.h.lng});if(d<bd){bd=d;best=x;}}
      order.push({...best,dist:bd*this.ROAD_FACTOR});cur={lat:best.h.lat,lng:best.h.lng};pool=pool.filter(x=>x.h.id!==best.h.id);
    }
    this._order=order;return order;
  },
  // Zeit-Scheduling: ETA-Kaskade ab Abfahrt, Termin-Anker (früh=warten, spät=Konflikt), Fertig-Prognose
  schedule(order){
    const s=State.settings;
    const start=s.dayStart!=null?s.dayStart:480;
    const dv=s.defaultVisitMin||20;
    let t=start; let anyLate=false;
    const rows=order.map(x=>{
      const driveMin=Math.round((x.dist||0)/45*60);   // ~45 km/h Landstraße
      t+=driveMin;
      let arrive=t, wait=0, lateBy=0;
      const appt=(x.h.apptMin!=null)?x.h.apptMin:null;
      if(appt!=null){
        if(arrive<appt){ wait=appt-arrive; arrive=appt; }        // zu früh → Wartezeit
        else if(arrive>appt){ lateBy=arrive-appt; anyLate=true; } // zu spät → Terminkonflikt
      }
      const visitMin=(x.h.visitMin!=null)?x.h.visitMin:dv;
      const depart=arrive+visitMin;
      t=depart;
      return {...x, driveMin, arrive, depart, wait, lateBy, appt, visitMin};
    });
    return {rows, start, end:t, anyLate, totalVisit:rows.reduce((a,r)=>a+r.visitMin,0), totalDrive:rows.reduce((a,r)=>a+r.driveMin,0)};
  },
  // Geplanter Tag: optimierte Reihenfolge + ggf. manuelle Umplanung + Zeitplan (für Log/Fahrtenbuch)
  plannedDay(){
    let order=this.optimize();
    const mr=State.settings.manualRoute, now=new Date();
    if(mr && mr.date===now.toDateString() && Array.isArray(mr.ids)){
      const byId={}; order.forEach(x=>byId[x.h.id]=x);
      const seq=mr.ids.filter(id=>byId[id]).map(id=>byId[id]);
      const rest=order.filter(x=>!mr.ids.includes(x.h.id));
      if(seq.length){ order=[...seq,...rest];
        let cur={lat:State.settings.originLat,lng:State.settings.originLng};
        order.forEach(x=>{x.dist=haversine(cur,{lat:x.h.lat,lng:x.h.lng})*this.ROAD_FACTOR; cur={lat:x.h.lat,lng:x.h.lng};});
      }
    }
    return {order, sch:this.schedule(order)};
  },
  focusHorse(id){
    const h=State.horses.find(x=>x.id===id);
    if(!h||h.lat==null||h.lng==null){Toast.show('Kein Standort hinterlegt — in Stammdaten ergänzen','warn');return;}
    this._focus={lat:h.lat,lng:h.lng,name:h.name,place:h.place||h.stable||''};Nav.go('map');
  },
  render(){
    const {order, sch}=this.plannedDay();
    this._order=order;
    const body=$('#routeBody');if(!body)return;
    this.drawMap(order);   // Karte immer initialisieren (Startpunkt + evtl. Stopps + Fokus-Pferd)
    if(!order.length){body.innerHTML=`<div style="color:var(--text-dim);text-align:center;padding:30px;font-size:13px">Keine Besuche markiert.<br><br>Markiere Pferde im Board, in der Liste oder in der Detailansicht als „Besuch fällig".</div>`;
      $('#routeStats').innerHTML='';$('#gmapsBtn').disabled=true;return;}
    const totalDist=order.reduce((s,x)=>s+x.dist,0);
    const durMin=sch.end-sch.start;
    const hm=m=>{m=Math.round(m);const h=Math.floor(m/60),mm=m%60;return h?(mm?`${h} h ${mm} min`:`${h} h`):`${mm} min`;};
    $('#routeStats').innerHTML=`<b>${fmtTime(sch.start)}</b> ab · <b>${order.length}</b> Stopps · <b>${fmt1(totalDist)}</b> km ≈ Straße · <b>${hm(durMin)}</b> · fertig <b>${fmtTime(sch.end)}</b>${sch.anyLate?` · <span class="rs-late">Terminkonflikt</span>`:''}`;
    $('#gmapsBtn').disabled=false;
    const excluded=State.horses.filter(h=>h.needsVisit&&(h.lat==null||h.lng==null));
    const exHtml=excluded.length?`<div class="chip amber" style="margin:0 0 8px;display:block">${IC.warn} ${excluded.length} markierte${excluded.length>1?'s':''} Pferd${excluded.length>1?'e':''} ohne Standort — nicht in Route (${excluded.map(h=>esc(h.name)).join(', ')})</div>`:'';
    body.innerHTML=exHtml+order.map((x,i)=>{
      const h=x.h; const rec=State.latestFor(h.id); const m=rec?rec.metrics:{}; const row=sch.rows[i];
      const flag=row.lateBy?`<span class="sflag late">${IC.warn} ${row.lateBy} min nach Termin ${fmtTime(row.appt)}</span>`
        :(row.wait?`<span class="sflag wait">${row.wait} min vor Termin ${fmtTime(row.appt)} — Puffer</span>`
        :(row.appt!=null?`<span class="sflag ok">pünktlich zu Termin ${fmtTime(row.appt)}</span>`:''));
      return `<div class="stop ${x.tri.level}${row.lateBy?' islate':''}" onclick="Views.openHorse('${h.id}')">
        <div class="ord">${i+1}</div>
        <div class="stime"><b>${fmtTime(row.arrive)}</b><span>${i===0?'ab Praxis':(row.driveMin?'+'+row.driveMin+' min':'gleicher Stall')}</span></div>
        <div class="sinfo">
          <b>${esc(h.name)} <span class="stri tri-${x.tri.level}"><span class="dot"></span>${Triage.LEVELS[x.tri.level].label}</span></b>
          <span class="sowner">${IC.owner}<span class="sow-txt"><b>${esc(h.owner||'—')}</b>${h.phone?`<em>${esc(h.phone)}</em>`:''}</span></span>
          <span class="splace">${esc(h.place||h.stable||'—')}${m.rmssd!=null?` · RMSSD <b>${fmt0(m.rmssd)}</b> · HF <b>${fmt0(m.meanHR)}</b>${rec?' · vor '+relTime(rec.startedAt):''}`:' · keine Messung'}</span>
          ${flag}
        </div>
        <div class="sright">
          <div class="sdist">${fmt1(x.dist)} km</div>
          <div class="sact">
            <a class="rowbtn ${h.phone?'':'disabled'}" ${h.phone?`href="tel:${esc(h.phone)}"`:''} onclick="event.stopPropagation()" title="Anrufen">${IC.phone}</a>
            <button class="rowbtn" onclick="event.stopPropagation();Dispatch.navTo('${h.id}')" title="Navigation">${IC.nav}</button>
          </div>
        </div>
      </div>`;
    }).join('');
  },
  drawMap(order){
    const origin={lat:State.settings.originLat,lng:State.settings.originLng};
    const cont=document.getElementById('map');
    if(typeof L==='undefined'){
      cont.innerHTML=`<div class="mapfallback"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/></svg><div>Karte offline nicht verfügbar.<br>Routenliste rechts & Google-Maps-Übergabe funktionieren.</div></div>`;
      return;
    }
    // Fallback-Platzhalter entfernen (sonst liegt er über den Kacheln)
    const fb=cont.querySelector('#mapFallback'); if(fb)fb.remove();
    // Bei Tab-Wechsel wird #map neu erzeugt → alte, detachte Map-Instanz verwerfen
    if(this._map && this._map.getContainer()!==cont){ try{this._map.remove();}catch(e){} this._map=null; this._layer=null; }
    if(!this._map){
      // fadeAnimation/zoomAnimation aus → verhindert eingefrorene opacity:0-Kacheln
      this._map=L.map(cont,{zoomControl:true,attributionControl:false,fadeAnimation:false,zoomAnimation:false,tap:false}).setView([origin.lat,origin.lng],10);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,crossOrigin:true}).addTo(this._map);
    }
    this._map.invalidateSize(false);
    if(this._layer)this._layer.remove();
    this._layer=L.layerGroup().addTo(this._map);
    const pin=(color,num,dim)=>L.divIcon({className:'',html:`<div style="width:28px;height:28px;position:relative;${dim?'opacity:.6;filter:saturate(.7)':''}"><div style="width:28px;height:28px;border-radius:50% 50% 50% 0;background:${color};transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5)"></div>${num!=null&&num!==''?`<span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12.5px;font-family:var(--font-brand)">${num}</span>`:''}</div>`,iconSize:[28,28],iconAnchor:[14,28]});
    L.marker([origin.lat,origin.lng],{icon:L.divIcon({className:'',html:`<div style="width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid var(--cyan);box-shadow:0 0 12px var(--cyan)"></div>`,iconSize:[16,16],iconAnchor:[8,8]})}).addTo(this._layer).bindPopup(`<b>${esc(State.settings.originLabel||'Praxis')}</b><br>Startpunkt`);
    const colors={crit:'#ff5263',elev:'#ffb547',watch:'#3ECFB2',stable:'#3fe0a4'};
    const latlngs=[[origin.lat,origin.lng]];
    order.forEach((x,i)=>{
      latlngs.push([x.h.lat,x.h.lng]);
      const h=x.h; const rec=State.latestFor(h.id); const m=rec?rec.metrics:{};
      const pop=`<div class="mappop">
        <div class="mp-h"><span class="mp-ord tri-${x.tri.level}">${i+1}</span><b>${esc(h.name)}</b></div>
        <div class="mp-tri tri-${x.tri.level}">${Triage.LEVELS[x.tri.level].label} · ${fmt1(x.dist)} km</div>
        <div class="mp-row"><b>Halter:</b> ${esc(h.owner||'—')}${h.phone?` · ${esc(h.phone)}`:''}</div>
        ${h.place||h.stable?`<div class="mp-row"><b>Stall:</b> ${esc(h.place||h.stable)}</div>`:''}
        ${m.rmssd!=null?`<div class="mp-row"><b>HRV:</b> RMSSD ${fmt0(m.rmssd)} · HF ${fmt0(m.meanHR)}${rec?' · vor '+relTime(rec.startedAt):''}</div>`:'<div class="mp-row">keine Messung</div>'}
        <div class="mp-act">${h.phone?`<a href="tel:${esc(h.phone)}">Anrufen</a>`:''}<a href="#" onclick="Views.openHorse('${h.id}');return false">Akte öffnen</a></div>
      </div>`;
      L.marker([h.lat,h.lng],{icon:pin(colors[x.tri.level],i+1)}).addTo(this._layer).bindPopup(pop);
    });
    if(latlngs.length>1)L.polyline(latlngs,{color:'#3ECFB2',weight:2.5,opacity:.7,dashArray:'6 8'}).addTo(this._layer);
    // Alle Kunden einblenden (Terminakquise): weitere Pferde mit Standort gedimmt zeigen
    if(this._showAll){
      const routeIds=new Set(order.map(x=>x.h.id));
      State.horses.filter(h=>h.lat!=null&&h.lng!=null&&!routeIds.has(h.id)).forEach(h=>{
        const rec=State.latestFor(h.id); const lvl=rec?rec.triage.level:'stable';
        const pop=`<div class="mappop">
          <div class="mp-h"><b>${esc(h.name)}</b></div>
          <div class="mp-tri tri-${lvl}">${Triage.LEVELS[lvl].label}${rec?' · vor '+relTime(rec.startedAt):' · keine Messung'}</div>
          <div class="mp-row"><b>Halter:</b> ${esc(h.owner||'—')}${h.phone?` · ${esc(h.phone)}`:''}</div>
          ${h.place||h.stable?`<div class="mp-row"><b>Stall:</b> ${esc(h.place||h.stable)}</div>`:''}
          <div class="mp-act"><a href="#" onclick="Dispatch.planFromMap('${h.id}');return false"><b style="color:var(--cyan-strong)">+ Besuch einplanen</b></a>${h.phone?`<a href="tel:${esc(h.phone)}">Anrufen</a>`:''}<a href="#" onclick="Views.openHorse('${h.id}');return false">Akte</a></div>
        </div>`;
        L.marker([h.lat,h.lng],{icon:pin(colors[lvl],'',true)}).addTo(this._layer).bindPopup(pop);
      });
    }
    // Fokus-Pferd aus der Liste (🧭 „Auf Karte zeigen") — Marker + Popup + zentrieren
    if(this._focus){
      const f=this._focus;this._focus=null;
      L.marker([f.lat,f.lng],{icon:pin('#3ECFB2')}).addTo(this._layer).bindPopup(`<b>${esc(f.name)}</b>${f.place?'<br>'+esc(f.place):''}`).openPopup();
      try{this._map.setView([f.lat,f.lng],13);}catch(e){}
      setTimeout(()=>{try{this._map.invalidateSize(false);}catch(e){}},140);return;
    }
    try{ if(latlngs.length>1)this._map.fitBounds(L.latLngBounds(latlngs).pad(0.25)); else this._map.setView(latlngs[0],11); }catch(e){}
    setTimeout(()=>{try{this._map.invalidateSize(false);}catch(e){}},140);
  },
  _showAll:false,
  toggleShowAll(){ this._showAll=!this._showAll; const b=$('#showAllBtn'); if(b)b.classList.toggle('on',this._showAll); this.render(); },
  async planFromMap(id){
    const h=State.horses.find(x=>x.id===id); if(!h)return;
    h.needsVisit=true; await DB.put('horses',h);
    Toast.show(`${h.name} als Besuch eingeplant — Route neu optimiert`,'ok');
    Nav.refresh();
  },
  openGoogleMaps(){
    if(!License.gate('routeHandoff','Route in Google Maps'))return;
    const order=this._order;if(!order||!order.length)return;
    const o=State.settings;
    const origin=`${o.originLat},${o.originLng}`;
    const dest=`${order[order.length-1].h.lat},${order[order.length-1].h.lng}`;
    const way=order.slice(0,-1).map(x=>`${x.h.lat},${x.h.lng}`);
    let url=`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&travelmode=driving`;
    if(way.length)url+=`&waypoints=${way.slice(0,9).map(encodeURIComponent).join('|')}`;
    window.open(url,'_blank');
    if(way.length>9)Toast.show('Google Maps: max. 10 Stopps übernommen (kritische zuerst)','warn');
  },
  exportRoute(){
    const order=this._order;if(!order||!order.length){Toast.show('Keine Route','warn');return;}
    let txt=`CARLON Abfahrroute — ab ${State.settings.originLabel}\n\n`;
    order.forEach((x,i)=>txt+=`${i+1}. ${x.h.name} — ${x.h.place||''} (${Triage.LEVELS[x.tri.level].label}, ${fmt1(x.dist)} km)\n   ${x.h.owner||''} ${x.h.phone||''}\n`);
    navigator.clipboard.writeText(txt).then(()=>Toast.show('Route kopiert','ok'));
  },
};

/* ════════════════════════════════════════════════════════════════════════
   REVENUE actions
   ════════════════════════════════════════════════════════════════════════ */
const Revenue={
  async toggleBilled(id){const c=State.consults.find(x=>x.id===id);c.billed=!c.billed;await DB.put('consults',c);Nav.refresh();},
  async markAllBilled(){ const open=State.consults.filter(c=>!c.billed); if(!open.length){Toast.show('Keine offenen Posten','info');return;}
    if(!confirm(`${open.length} offene Beratung${open.length!==1?'en':''} als abgerechnet markieren?`))return;
    for(const c of open){c.billed=true;await DB.put('consults',c);} Toast.show(`${open.length} als abgerechnet markiert`,'ok'); Nav.refresh(); },
  monthly(n=6){
    const now=new Date(); const buckets=[];
    for(let i=n-1;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);buckets.push({y:d.getFullYear(),m:d.getMonth(),label:d.toLocaleDateString('de-DE',{month:'short'}),sum:0,billed:0,open:0});}
    State.consults.forEach(c=>{const d=new Date(c.date);const b=buckets.find(x=>x.y===d.getFullYear()&&x.m===d.getMonth());if(b){const f=c.fee||0;b.sum+=f;if(c.billed)b.billed+=f;else b.open+=f;}});
    return buckets;
  },
  byCustomer(){
    const map={};
    State.consults.forEach(c=>{const h=State.horses.find(x=>x.id===c.horseId);const key=h?(h.owner||h.name||'—'):(c.cohLabel||'Kohärenz-Coaching');
      (map[key]=map[key]||{name:key,sum:0,n:0,open:0});map[key].sum+=(c.fee||0);map[key].n++;if(!c.billed)map[key].open+=(c.fee||0);});
    return Object.values(map).sort((a,b)=>b.sum-a.sum);
  },
  barChart(months,{w=680,h=196}={}){
    const pad={l:46,r:12,t:16,b:26}; const max=Math.max(1,...months.map(m=>m.sum)); const n=months.length;
    const bw=(w-pad.l-pad.r)/n; const X=i=>pad.l+i*bw; const Y=v=>pad.t+(1-v/max)*(h-pad.t-pad.b);
    let g=''; const yt=Chart.niceTicks(0,max,4);
    yt.forEach(t=>{g+=`<line class="grid-minor" x1="${pad.l}" x2="${w-pad.r}" y1="${Y(t).toFixed(1)}" y2="${Y(t).toFixed(1)}"/><text x="${pad.l-6}" y="${(Y(t)+3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--text-dim)">${fmt0(t)}</text>`;});
    months.forEach((m,i)=>{const x=X(i)+bw*0.24, bwid=bw*0.52; const yB=Y(m.billed), y0=Y(0), yS=Y(m.sum);
      if(m.billed>0)g+=`<rect x="${x.toFixed(1)}" y="${yB.toFixed(1)}" width="${bwid.toFixed(1)}" height="${Math.max(0,y0-yB).toFixed(1)}" fill="var(--good)" rx="3"/>`;
      if(m.open>0)g+=`<rect x="${x.toFixed(1)}" y="${yS.toFixed(1)}" width="${bwid.toFixed(1)}" height="${Math.max(0,yB-yS).toFixed(1)}" fill="var(--amber)" opacity=".85" rx="3"/>`;
      if(m.sum>0)g+=`<text x="${(x+bwid/2).toFixed(1)}" y="${(yS-5).toFixed(1)}" text-anchor="middle" font-size="9.5" font-weight="600" fill="var(--text-secondary)">${fmt0(m.sum)}</text>`;
      g+=`<text x="${(x+bwid/2).toFixed(1)}" y="${(h-9).toFixed(1)}" text-anchor="middle" font-size="10" fill="var(--text-dim)">${esc(m.label)}</text>`;});
    return `<svg class="viz" viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">${g}</svg>`;
  },
  exportCSV(){
    if(!License.gate('csv','CSV-Export'))return;
    const rows=[['Datum','Pferd','Besitzer','Art','Dauer_Min','Honorar_EUR','Status']];
    const hn=c=>{const h=State.horses.find(x=>x.id===c.horseId);return h?[h.name,h.owner||'']:[c.cohLabel||'',''];};

/* ── Voice — Sprachnotizen (MediaRecorder, offline, kein ASR) ── */
const Voice={
  _rec:null,_chunks:[],_hid:null,_start:0,_stream:null,
  isRecording(hid){return this._rec&&this._rec.state==='recording'&&(!hid||this._hid===hid);},
  list(hid){const h=State.horses.find(x=>x.id===hid);return ((h&&h.voiceNotes)||[]).slice().sort((a,b)=>b.createdAt.localeCompare(a.createdAt));},
  async toggle(hid){
    if(this.isRecording()){ this._rec.stop(); return; }
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      this._stream=stream;
      const mime=['audio/webm','audio/mp4','audio/ogg'].find(m=>window.MediaRecorder&&MediaRecorder.isTypeSupported(m));
      const rec=new MediaRecorder(stream,mime?{mimeType:mime}:undefined);
      this._rec=rec; this._chunks=[]; this._hid=hid; this._start=Date.now();
      rec.ondataavailable=e=>{if(e.data&&e.data.size)this._chunks.push(e.data);};
      rec.onstop=async()=>{
        const blob=new Blob(this._chunks,{type:(this._rec&&this._rec.mimeType)||'audio/webm'});
        const dur=Math.max(1,Math.round((Date.now()-this._start)/1000));
        try{this._stream.getTracks().forEach(t=>t.stop());}catch(_){}
        const hid=this._hid; this._rec=null; this._stream=null;
        const h=State.horses.find(x=>x.id===hid);
        if(blob.size>600 && h){
          const note={id:'v_'+Math.abs(hashStr(hid+Date.now()+blob.size)).toString(36),blob,mime:blob.type,durationSec:dur,createdAt:new Date().toISOString()};
          h.voiceNotes=h.voiceNotes||[]; h.voiceNotes.push(note); await DB.put('horses',h);
          Toast.show(`Sprachnotiz gespeichert · ${dur}s`,'ok');
        } else Toast.show('Aufnahme zu kurz','warn');
        Nav.refresh();
      };
      rec.start(); Nav.refresh();
    }catch(e){ Toast.show('Mikrofon nicht verfügbar — Zugriff erlauben','warn'); }
  },
  play(id,btn){
    let v=null; for(const h of State.horses){ v=(h.voiceNotes||[]).find(x=>x.id===id); if(v)break; }
    if(!v)return;
    const url=URL.createObjectURL(v.blob); const a=new Audio(url);
    if(btn)btn.classList.add('playing');
    a.onended=()=>{URL.revokeObjectURL(url); if(btn)btn.classList.remove('playing');};
    a.play().catch(()=>{URL.revokeObjectURL(url); if(btn)btn.classList.remove('playing'); Toast.show('Wiedergabe fehlgeschlagen','warn');});
  },
  async del(id){
    if(!confirm('Sprachnotiz löschen?'))return;
    const h=State.horses.find(x=>(x.voiceNotes||[]).some(v=>v.id===id));
    if(h){ h.voiceNotes=h.voiceNotes.filter(v=>v.id!==id); await DB.put('horses',h); }
    Toast.show('Sprachnotiz gelöscht','info'); Nav.refresh();
  },
  _find(id){ for(const h of State.horses){ const v=(h.voiceNotes||[]).find(x=>x.id===id); if(v)return {v,h}; } return null; },
  _ext(v){ const m=(v.mime||'').toLowerCase(); return m.includes('mp4')?'m4a':m.includes('ogg')?'ogg':'webm'; },
  _file(id){ const f=this._find(id); if(!f)return null; const v=f.v;
    return new File([v.blob],`carlon-sprachnotiz-${f.h.name.replace(/[^\w]+/g,'_')}-${v.createdAt.slice(0,10)}-${v.durationSec}s.${this._ext(v)}`,{type:v.mime||'audio/webm'}); },
  // An App/KI teilen (native Share-Sheet) — verlässt CARLON, Weiterverarbeitung = Sache des Vets
  async share(id){
    const file=this._file(id); if(!file)return;
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file],title:'CARLON Sprachnotiz',text:'Sprachnotiz zur Weiterverarbeitung'}); }catch(e){}
    } else { this.export(id); Toast.show('Teilen hier nicht verfügbar — als Datei exportiert','info'); }
  },
  // Als Audiodatei exportieren (Download → Ordner, dann in KI/Transkription der Wahl)
  export(id){
    const file=this._file(id); if(!file)return;
    const a=document.createElement('a'); a.href=URL.createObjectURL(file); a.download=file.name; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    Toast.show('Sprachnotiz exportiert · Weiterverarbeitung liegt bei dir','ok');
  }
};

/* ════════════════════════════════════════════════════════════════════════
   COHERENCE — Kohärenzforschung (CoherentBurst · µs-synchrone Kopplung)
   Pferd↔Reiter / Herde · HeartMath-Pair-Score · gerichtete Kohärenz ·
   Surrogat-Signifikanz · Sync-Qualität · wissenschaftliche Integrität
   ════════════════════════════════════════════════════════════════════════ */
const Coherence={
  verdictLabel(v,score){
    if(v&&/HIGH_COH|^COHER|COHERENT|STRONG/i.test(v)) return 'Kohärent';
    if(v&&/PARTIAL|WEAK|MODERATE|TREND/i.test(v)) return 'Teilkohärent';
    if(v&&/NO_COH|NULL|INDEP/i.test(v)){ if(score>=60)return 'Teilkohärent'; return 'Unabhängig'; }
    if(score>=62) return 'Kohärent'; if(score>=42) return 'Teilkohärent'; return 'Unabhängig';
  },
  level(rec){const l=this.verdictLabel(rec.verdict,rec.score);return l==='Kohärent'?'coh':l==='Teilkohärent'?'partial':'indep';},
  levelColor(lvl){return {coh:'var(--good)',partial:'var(--amber)',indep:'var(--text-dim)'}[lvl];},
  direction(rec){
    const a=rec.dcAtoB, b=rec.dcBtoA;
    if(rec.dcVerdict&&/NULL|NONE/i.test(rec.dcVerdict)) return {txt:'Keine gerichtete Kopplung nachweisbar',dir:'none'};
    if(a==null||b==null) return {txt:'—',dir:'none'};
    if(a>b*1.3) return {txt:`${esc(rec.beingA)} führt die Kopplung`,dir:'ab'};
    if(b>a*1.3) return {txt:`${esc(rec.beingB)} führt die Kopplung`,dir:'ba'};
    return {txt:'Symmetrische Kopplung',dir:'sym'};
  },
  normalize(raw,meta){
    const cm=raw.coherenceMetrics||{}, cb=raw.coherentBurst||{}, sv=raw.syncValidation||{}, hw=raw.hardwareFingerprint||{}, pr=raw.preRegistrationLock||{}, ig=raw.integrity||{};
    const ss=cb.salvoSummary||{};
    return {
      startedAt: raw.recordingStartedAt||raw.measuredAt||cb.measuredAt||null,
      durationSec: num(raw.recordingDurationSec),
      beingA: (meta&&meta.beingA)||'Pferd', beingB:(meta&&meta.beingB)||'Reiter / Mensch',
      label: (meta&&meta.label)||null,
      score: Math.round(num(cm.heartMathPairScore0to100) ?? 0),
      verdict: cm.verdict||null,
      ratioA: num(cm.heartMathRatioHorse), ratioB:num(cm.heartMathRatioHuman),
      plvHF: num(cm.phaseLockingValueHF),
      cohHF: num(cm.spectralCoherenceHF), cohLF:num(cm.spectralCoherenceLF), threshold:num(cm.preRegisteredThresholdHF)??0.5,
      crossCorr: num(cm.crossCorrelationRR), crossLag:num(cm.crossCorrelationLagMs),
      dcAtoB: num(cm.directedCoherenceHorseToHumanHF), dcBtoA:num(cm.directedCoherenceHumanToHorseHF),
      dcVerdict: cm.directedCoherenceVerdict||null, dcAsym:num(cm.directedCoherenceAsymmetryHF),
      susyZ: num(cm.susyZ), susyP:num(cm.susyPValue), susyMode:cm.susyCouplingMode||null,
      nSurr: num(cm.susyNSurrogates), nSeg:num(cm.susyNSegments),
      sync:{
        fireSkewMs: num(ss.medianFireSkewMs)??num(cb.fireSkewMs), roundtripMs:num(ss.medianTotalRoundtripMs)??num(cb.totalRoundtripMs),
        responseSkewMs: num(cb.responseSkewMs), verdict:sv.verdict||null,
        beatPairing: num(sv.beatPairingPercent), meanRRDelta:num(sv.meanRRDeltaMs),
        rmssdDelta: num(sv.rmssdDeltaMs), drift:num(sv.rrStreamDriftMsPerMinute), verdictAtStart:cb.verdictAtStart||null,
      },
      devices: hw.deviceAliases||[], deviceCount:num(hw.deviceCount)||(hw.deviceAliases||[]).length,
      integritySha: ig.sha256||null, preRegFile:pr.preRegFilename||null, preRegSha:pr.preRegSha256||null,
      toolVersion: raw.toolVersion||cb.toolVersion||null, schemaVersion:raw.schemaVersion||null,
      identitySuspected: cm.identitySetupSuspected===true,
    };
  },
  pairKey(a,b){return [a||'',b||''].map(x=>x.toLowerCase().trim()).sort().join('__');},
  byPair(){
    const map={};
    State.coherence.forEach(c=>{const k=c.pairKey||this.pairKey(c.beingA,c.beingB);(map[k]=map[k]||[]).push(c);});
    return Object.entries(map).map(([k,sessions])=>{
      sessions.sort((a,b)=>new Date(a.startedAt)-new Date(b.startedAt));
      const latest=sessions[sessions.length-1];
      let trend=null;
      if(sessions.length>=2){const d=latest.score-sessions[0].score;const dLast=latest.score-sessions[sessions.length-2].score;
        trend={dir:dLast>3?'up':dLast<-3?'down':'flat',totalDelta:d,lastDelta:dLast};}
      return {pairKey:k,label:latest.label,beingA:latest.beingA,beingB:latest.beingB,sessions,latest,trend};
    }).sort((a,b)=>b.latest.score-a.latest.score);
  },
  pair(key){return this.byPair().find(p=>p.pairKey===key);},
  async ingest(raw,meta){
    const n=this.normalize(raw,meta);
    const id='co_'+Math.abs(hashStr(JSON.stringify({t:n.startedAt,s:n.score,d:n.devices,sha:n.integritySha}))).toString(36);
    if(State.coherence.some(c=>c.id===id)) return {dup:true,label:n.label||'Kohärenz-Session',score:n.score,verdictLabel:this.verdictLabel(n.verdict,n.score)};
    const rec={id,...n};
    if(!rec.label) rec.label=`${rec.beingA} ↔ ${rec.beingB}`;
    rec.pairKey=this.pairKey(rec.beingA,rec.beingB);
    await DB.put('coherence',rec); State.coherence.push(rec);
    return {dup:false,label:rec.label,score:n.score,verdictLabel:this.verdictLabel(n.verdict,n.score)};
  },
  async del(id){await DB.del('coherence',id);State.coherence=State.coherence.filter(c=>c.id!==id);},
  // App-Verdict-Band (EquineHarmonyScoreCenter.coherenceBand): p<0,05 → belegt; cohHF entscheidet Stufe
  band(c){
    const sig=c.susyP!=null&&c.susyP<0.05; const hf=c.cohHF||0;
    if(sig&&hf>=0.5) return {label:'Nachgewiesene Kopplung',color:'var(--good)',proven:true};
    if(sig) return {label:'Belegte Kopplung',color:'var(--cyan-strong)',proven:true};
    if(hf>=0.4) return {label:'Kopplungs-Momente',color:'var(--amber)',proven:false};
    return {label:'Schwaches Signal',color:'var(--harmony-strong)',proven:false};
  },
  interp(c){
    const z=c.susyZ; if(z==null) return 'Signifikanz nicht bestimmt.';
    if(c.susyP!=null&&c.susyP<0.05) return `${fmt1(z)}σ über dem Zufall · p < 0,05 → echte Kopplung, statistisch belegt.`;
    return `${fmt1(z)}σ über dem Zufall · p = ${c.susyP!=null?c.susyP.toFixed(2):'—'} → noch im Zufallsbereich.`;
  },
  // Surrogat-Null-Verteilung (App-Viz G): Gauß-Glocke (Zufall) + Marker eurer Kopplung in σ
  surrogateBell(c){
    if(c.susyZ==null) return '';
    const w=360,h=176,pad={l:14,r:14,t:20,b:30};
    const zc=Math.max(-4,Math.min(6,c.susyZ)); const xmin=-4,xmax=Math.max(4.2,zc+0.7);
    const X=x=>pad.l+(x-xmin)/(xmax-xmin)*(w-pad.l-pad.r), Y=v=>pad.t+(1-v)*(h-pad.t-pad.b);
    const col=this.band(c).color; const N=90; const pts=[];
    for(let i=0;i<=N;i++){const x=xmin+(xmax-xmin)*i/N;pts.push([X(x),Y(Math.exp(-x*x/2))]);}
    const line=pts.map((p,i)=>`${i?'L':'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
    const area=line+` L${X(xmax).toFixed(1)},${Y(0).toFixed(1)} L${X(xmin).toFixed(1)},${Y(0).toFixed(1)} Z`;
    const mx=X(zc);
    let g=`<defs><linearGradient id="bellg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="rgba(255,255,255,.16)"/><stop offset="1" stop-color="rgba(255,255,255,.025)"/></linearGradient></defs>`;
    g+=`<path d="${area}" fill="url(#bellg)"/>`;
    g+=`<path d="${line}" fill="none" stroke="rgba(255,255,255,.34)" stroke-width="1.4"/>`;
    g+=`<line x1="${X(xmin).toFixed(1)}" y1="${Y(0).toFixed(1)}" x2="${X(xmax).toFixed(1)}" y2="${Y(0).toFixed(1)}" stroke="rgba(255,255,255,.14)"/>`;
    g+=`<line x1="${X(1.64).toFixed(1)}" y1="${pad.t}" x2="${X(1.64).toFixed(1)}" y2="${Y(0).toFixed(1)}" stroke="rgba(255,255,255,.22)" stroke-dasharray="4 3"/>`;
    g+=`<text x="${X(1.64).toFixed(1)}" y="${(pad.t-6).toFixed(1)}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.4)">p&lt;0,05</text>`;
    g+=`<line x1="${mx.toFixed(1)}" y1="${(pad.t-4).toFixed(1)}" x2="${mx.toFixed(1)}" y2="${Y(0).toFixed(1)}" stroke="${col}" stroke-width="2.4"/>`;
    g+=`<circle cx="${mx.toFixed(1)}" cy="${(pad.t-4).toFixed(1)}" r="4" fill="${col}"/>`;
    g+=`<text x="${X(0).toFixed(1)}" y="${(h-9).toFixed(1)}" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.42)">Zufall (${fmt0(c.nSurr)||'500'}×)</text>`;
    g+=`<text x="${Math.min(w-40,Math.max(40,mx)).toFixed(1)}" y="${(h-9).toFixed(1)}" text-anchor="middle" font-size="9" font-weight="700" fill="${col}">Eure Kopplung</text>`;
    for(const s of [-2,0,2,4]){ if(s<xmin||s>xmax)continue; g+=`<text x="${X(s).toFixed(1)}" y="${(Y(0)+13).toFixed(1)}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.3)">${s}σ</text>`; }
    return `<svg class="viz" viewBox="0 0 ${w} ${h}">${g}</svg>`;
  },
};

/* ════════════════════════════════════════════════════════════════════════
   LICENSE — Tier-Gating (Demo → Vet-Solo / Vet-Clinic), offline verifiziert
   Der monatliche Zahlungs-Mechanismus: signierte Keys mit Ablaufdatum.
   ════════════════════════════════════════════════════════════════════════ */
const License={
  PUB:{kty:'EC',crv:'P-256',x:'pqbiPaa-gOiZKjeRsQ7XMRe9am5L7giiV48Qjzp3enY',y:'5lg4Ipa-paTigXd7rxitFKwpee8h1Lu0W5eod1mYOok'},
  TIERS:{demo:{name:'Demo',color:'demo'},vet_solo:{name:'Vet-Solo',color:'paid'},vet_clinic:{name:'Vet-Clinic',color:'paid'},research:{name:'Research',color:'paid'}},
  PRICES:{vet_solo:'49 €/Mo',vet_clinic:'149 €/Mo',research:'29 €/Mo'},
  // ── Lemon Squeezy (Merchant of Record + native Lizenz-API) ──
  // Bei CORS-Problemen LS_BASE auf den eigenen Cloudflare-Worker-Proxy umbiegen (siehe cloudflare-worker.js).
  LS_BASE:'https://api.lemonsqueezy.com/v1',
  // Store-Checkout (Jan trägt hier seine Lemon-Squeezy-Store-URL / Produkt-Links ein):
  CHECKOUT:{vet_solo:'https://carlon-equine.lemonsqueezy.com/buy/VET-SOLO',vet_clinic:'https://carlon-equine.lemonsqueezy.com/buy/VET-CLINIC'},
  // Jans Variant-IDs aus dem Lemon-Squeezy-Store hier eintragen (siehe lemonsqueezy-setup.md):
  LS_VARIANTS:{ /* '123456':'vet_solo', '123457':'vet_clinic', '123458':'research' */ },
  variantToTier(meta){
    if(!meta)return 'vet_solo';
    if(meta.variant_id!=null && this.LS_VARIANTS[String(meta.variant_id)]) return this.LS_VARIANTS[String(meta.variant_id)];
    const n=((meta.variant_name||'')+' '+(meta.product_name||'')).toLowerCase();
    if(n.includes('clinic')||n.includes('klinik'))return 'vet_clinic';
    if(n.includes('research')||n.includes('akadem')||n.includes('uni'))return 'research';
    return 'vet_solo';
  },
  _expTs(lk){if(lk&&lk.expires_at){const t=Date.parse(lk.expires_at);return isNaN(t)?null:Math.floor(t/1000);}return null;},
  _b64(s){s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';const b=atob(s);const u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;},
  async verify(rawKey){
    try{
      let k=(rawKey||'').trim();if(k.startsWith('CARLON-'))k=k.slice(7);
      const [pB64,sB64]=k.split('.');if(!pB64||!sB64)return{valid:false,reason:'Format ungültig'};
      const pub=await crypto.subtle.importKey('jwk',this.PUB,{name:'ECDSA',namedCurve:'P-256'},false,['verify']);
      const ok=await crypto.subtle.verify({name:'ECDSA',hash:'SHA-256'},pub,this._b64(sB64),new TextEncoder().encode(pB64));
      if(!ok)return{valid:false,reason:'Signatur ungültig'};
      const p=JSON.parse(new TextDecoder().decode(this._b64(pB64)));
      if(p.iss!=='carlon-clinic')return{valid:false,reason:'Fremder Aussteller'};
      const expired=p.exp*1000<Date.now();
      return{valid:!expired,expired,tier:p.tier,lic:p.lic,exp:p.exp,founder:!!p.founder};
    }catch(e){return{valid:false,reason:e.message||'Fehler'};}
  },
  tier(){return (State.license&&State.license.tier)||'demo';},
  isPaid(){return this.tier()!=='demo';},
  maxHorses(){return this.isPaid()?Infinity:3;},
  PAID_ONLY:['pdf','csv','routeHandoff','coherence','ownerFeedback'],
  can(f){return this.isPaid()?true:!this.PAID_ONLY.includes(f);},
  async activate(rawKey){
    const key=(rawKey||'').trim();
    if(!key){Toast.show('Bitte Schlüssel eingeben','warn');return false;}
    return key.startsWith('CARLON-')?this._activateOffline(key):this._activateLS(key);
  },
  async _activateLS(key){
    try{
      const uid=(crypto.randomUUID?crypto.randomUUID().slice(0,8):Math.abs(hashStr(key+performance.now())).toString(36));
      const inst=(State.settings.clinicName||'CARLON EQUINE')+' · '+uid;
      const res=await fetch(this.LS_BASE+'/licenses/activate',{method:'POST',headers:{'Accept':'application/json','Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({license_key:key,instance_name:inst})});
      const d=await res.json();
      if(!d.activated){Toast.show('Lizenz nicht aktivierbar: '+((d.error)||'ungültig oder Aktivierungslimit erreicht'),'warn');return false;}
      const tier=this.variantToTier(d.meta);
      State.license={provider:'ls',tier,lic:(d.meta&&d.meta.customer_name)||'Lizenz',key,instanceId:d.instance&&d.instance.id,exp:this._expTs(d.license_key)};
      State.settings.license=State.license;await State.saveSettings();
      UI.closeModal();Toast.show(`Freigeschaltet: ${this.TIERS[tier].name}`,'ok');Nav.render();return true;
    }catch(e){Toast.show('Aktivierung fehlgeschlagen — Netzwerk/CORS. Bei Bedarf Worker-Proxy nutzen (siehe lemonsqueezy-setup.md).','warn');return false;}
  },
  async _validateLS(){
    const l=State.license;if(!l||l.provider!=='ls'||!l.key)return;
    try{
      const res=await fetch(this.LS_BASE+'/licenses/validate',{method:'POST',headers:{'Accept':'application/json','Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({license_key:l.key,instance_id:l.instanceId||''})});
      const d=await res.json();
      if(d&&d.valid===false){State.license={tier:'demo',expiredTier:l.tier,founder:l.founder,lic:l.lic};State.settings.license=null;await State.saveSettings();Nav.render();}
      else if(d&&d.license_key){l.exp=this._expTs(d.license_key);State.settings.license=l;await State.saveSettings();}
    }catch(e){/* offline → Grace-Period: bestehende Lizenz behalten, kein Downgrade */}
  },
  async _activateOffline(key){
    const r=await this.verify(key);
    if(!r.valid){Toast.show(r.expired?'Lizenz abgelaufen — bitte verlängern':('Lizenz ungültig'+(r.reason?' ('+r.reason+')':'')),'warn');return false;}
    State.license={provider:'offline',tier:r.tier,lic:r.lic,exp:r.exp,key,founder:r.founder};
    State.settings.license=State.license;await State.saveSettings();
    UI.closeModal();Toast.show(`Freigeschaltet: ${this.TIERS[r.tier].name} · ${r.lic}`,'ok');Nav.render();return true;
  },
  async deactivate(){
    const l=State.license;
    if(l&&l.provider==='ls'&&l.key&&l.instanceId){try{await fetch(this.LS_BASE+'/licenses/deactivate',{method:'POST',headers:{'Accept':'application/json','Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({license_key:l.key,instance_id:l.instanceId})});}catch(e){}}
    State.license={tier:'demo'};State.settings.license=null;await State.saveSettings();Nav.render();
  },
  async startTrial(){
    if(State.settings.trialUsed){Toast.show('Testphase wurde bereits genutzt','warn');UI.upgrade();return false;}
    const exp=Math.floor((Date.now()+30*86400000)/1000);
    State.license={provider:'trial',tier:'vet_solo',lic:'30-Tage-Test',exp};
    State.settings.license=State.license;State.settings.trialUsed=true;await State.saveSettings();
    UI.closeModal();Toast.show('30-Tage-Vollzugang aktiviert — voller Funktionsumfang','ok');Nav.render();return true;
  },
  trialAvailable(){return (typeof BETA_GATED!=='undefined'&&BETA_GATED)?false:!State.settings.trialUsed;},
  isTrial(){return State.license&&State.license.provider==='trial';},
  async loadFromSettings(){
    const l=State.settings.license;
    if(l&&l.provider==='trial'){State.license=(l.exp*1000>Date.now())?l:{tier:'demo',expiredTier:'vet_solo'};return;}
    if(l&&l.key){
      State.license=l;                        // sofort anwenden (Grace, funktioniert offline)
      if(l.provider==='offline'){const r=await this.verify(l.key);State.license=r.valid?{...l,tier:r.tier,exp:r.exp,founder:r.founder}:{tier:'demo',expiredTier:l.tier,founder:l.founder,lic:l.lic};}
      else this._validateLS();                // Lemon Squeezy im Hintergrund revalidieren (non-blocking)
    } else State.license={tier:'demo'};
  },
  // Gate: true wenn erlaubt, sonst zeigt Upgrade-Modal und gibt false zurück
  gate(feature,label){
    if(this.can(feature))return true;
    UI.upgrade(label);return false;
  },
  daysLeft(){const l=State.license;if(!l||!l.exp)return null;return Math.max(0,Math.round((l.exp*1000-Date.now())/86400000));},
  isFounder(){const l=State.license;return !!(l&&l.founder);},
  // Erneuerungs-Bedarf (kein stiller Cliff): abgelaufen / läuft bald ab. Modus-aware.
  needsRenewal(){
    const l=State.license; if(!l)return null;
    if(l.expiredTier)return{state:'expired',tier:l.expiredTier,founder:!!l.founder};
    const d=this.daysLeft();
    if(d!=null&&d<=7&&(this.isPaid()||this.isTrial()))return{state:'expiring',tier:this.tier(),days:d,founder:!!l.founder};
    return null;
  },
  // Nahtlose Verlängerung: Beta → Partner-Bewerbung, Paid → Kauf/Schlüssel (UI.upgrade branch-t auf BETA_GATED)
  renew(){ UI.upgrade(); },
};

/* Geocoding via OpenStreetMap Nominatim (nur Ortsangabe, keine Gesundheitsdaten) */
async function geocode(q){
  if(!q||!q.trim())return null;
  const url='https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(q);
  try{const r=await fetch(url,{headers:{'Accept':'application/json'}});const d=await r.json();
    if(d&&d[0])return {lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon),label:d[0].display_name};}catch(e){}
  return null;
}
async function geoLookup(qId,latId,lngId,btn){
  const q=$('#'+qId).value; if(!q){Toast.show('Bitte Ort/Adresse eingeben','warn');return;}
  const old=btn.textContent;btn.textContent='…';btn.disabled=true;
  const res=await geocode(q);
  btn.textContent=old;btn.disabled=false;
  if(res){$('#'+latId).value=res.lat.toFixed(5);$('#'+lngId).value=res.lng.toFixed(5);Toast.show('Koordinaten gefunden: '+res.label.split(',').slice(0,2).join(','),'ok');}
  else Toast.show('Adresse nicht gefunden — bitte präziser (Ort, PLZ)','warn');
}

/* ════════════════════════════════════════════════════════════════════════
   CAL — Termin-Integration (Google Calendar + Apple/ICS), ganz ohne H10
   ════════════════════════════════════════════════════════════════════════ */
const Cal={
  _fmt(d){return d.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');},
  _fmtLocal(d){const p=n=>String(n).padStart(2,'0');return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'T'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds());},
  // Chooser: Reminder wählen + Apple/.ics oder Google — „Tag → Kalender" perfektioniert
  dayChooser(){
    const pd=Dispatch.plannedDay(); const n=pd.sch.rows.length;
    if(!n){Toast.show('Keine Besuche für heute markiert','warn');return;}
    UI.modal(`<div class="qa">
      <div class="qa-head"><span style="width:42px;height:42px;border-radius:12px;background:var(--cyan-faint);color:var(--cyan);display:flex;align-items:center;justify-content:center">${IC.calendar}</span><div class="qa-id"><b>Tag in den Kalender</b><span>${n} Termine mit Zeiten, Adressen &amp; Erinnerung</span></div></div>
      <div style="padding:4px 20px 0"><label style="font-size:12px;font-weight:600;color:var(--text-secondary)">Erinnerung vorher</label>
        <div class="fee-chips" style="margin-top:8px" id="calRemind">${[['0','pünktlich'],['15','15 min'],['30','30 min'],['60','1 h']].map(([v,l],i)=>`<button type="button" class="feechip ${v==='30'?'on':''}" data-v="${v}" onclick="[...this.parentNode.children].forEach(c=>c.classList.remove('on'));this.classList.add('on')">${l}</button>`).join('')}</div></div>
      <div class="qa-grid">
        <button class="qa-item primary" onclick="Cal.dayIcs()">${IC.download}<span>Apple / Outlook (.ics)</span></button>
        <button class="qa-item" onclick="Cal.dayIcs()">${IC.calendar}<span>Google Kalender</span></button>
      </div>
      <div style="padding:0 20px 16px;font-size:11.5px;color:var(--text-dim)">Die .ics-Datei importiert alle Termine auf einmal — in Apple Kalender, Google Kalender und Outlook. Jeder Termin enthält Halter, HRV-Kurzstatus, Adresse und einen Navigations-Link.</div>
    </div>`,{sheet:true});
  },
  gcal(o){const end=new Date(o.start.getTime()+(o.durationMin||60)*60000);
    const u=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(o.title)}&details=${encodeURIComponent(o.details||'')}&location=${encodeURIComponent(o.location||'')}&dates=${this._fmt(o.start)}/${this._fmt(end)}`;
    window.open(u,'_blank');},
  ics(o){const end=new Date(o.start.getTime()+(o.durationMin||60)*60000);
    const e=s=>String(s||'').replace(/([,;\\])/g,'\\$1').replace(/\n/g,'\\n');
    const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//CARLON EQUINE//DE','CALSCALE:GREGORIAN','BEGIN:VEVENT',
      'UID:'+Math.abs(hashStr(o.title+o.start.getTime())).toString(36)+'@carlon-equine','DTSTAMP:'+this._fmt(new Date()),
      'DTSTART:'+this._fmtLocal(o.start),'DTEND:'+this._fmtLocal(end),'SUMMARY:'+e(o.title),
      'DESCRIPTION:'+e(o.details||''),'LOCATION:'+e(o.location||''),
      'BEGIN:VALARM','TRIGGER:-PT60M','ACTION:DISPLAY','DESCRIPTION:'+e(o.title),'END:VALARM','END:VEVENT','END:VCALENDAR'].join('\r\n');
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));a.download='carlon-termin.ics';a.click();},
  // Ganzer Tag als Multi-Event-.ics (Apple/Google/Outlook-Import) — nutzt den Zeitplan (ETAs/Termine)
  dayIcs(){
    const pd=Dispatch.plannedDay(); const rows=pd.sch.rows;
    if(!rows.length){Toast.show('Keine Besuche für heute markiert','warn');return;}
    const remEl=$('#calRemind .feechip.on'); const rem=remEl?parseInt(remEl.dataset.v,10):15;
    const esc=s=>String(s||'').replace(/([,;\\])/g,'\\$1').replace(/\n/g,'\\n');
    const now=new Date(); const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const at=min=>new Date(base.getTime()+min*60000);
    const L=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//CARLON EQUINE//DE','CALSCALE:GREGORIAN','METHOD:PUBLISH','X-WR-CALNAME:CARLON Tagesplan','X-WR-TIMEZONE:'+(Intl.DateTimeFormat().resolvedOptions().timeZone||'Europe/Berlin')];
    rows.forEach((r,i)=>{
      const h=r.h; const rec=State.latestFor(h.id); const m=rec?rec.metrics:{};
      const start=r.appt!=null?at(r.appt):at(r.arrive);
      const end=new Date(start.getTime()+(r.visitMin||20)*60000);
      const title=`${i+1}. ${h.name} — ${Triage.LEVELS[r.tri.level].label}`;
      const navi=(h.lat!=null&&h.lng!=null)?`https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lng}&travelmode=driving`:'';
      const desc=[h.owner?`Halter: ${h.owner}`:'',h.phone?`Tel: ${h.phone}`:'',
        m.rmssd!=null?`RMSSD ${fmt0(m.rmssd)} · Ruhe-HF ${fmt0(m.meanHR)} bpm`:'',
        r.appt!=null?`Fester Termin ${fmtTime(r.appt)}`:`Geplante Ankunft ${fmtTime(r.arrive)}`,
        `Anfahrt ${fmt1(r.dist)} km`, navi?`Navigation: ${navi}`:'',
        '— CARLON EQUINE · HRV-Telemetrie (Screening, keine Diagnose)'].filter(Boolean).map(esc).join('\\n');
      L.push('BEGIN:VEVENT','UID:'+Math.abs(hashStr(h.id+start.getTime())).toString(36)+'@carlon-equine',
        'DTSTAMP:'+this._fmt(now),'DTSTART:'+this._fmtLocal(start),'DTEND:'+this._fmtLocal(end),
        'SUMMARY:'+esc(title),'DESCRIPTION:'+desc,'LOCATION:'+esc(h.place||h.stable||''),
        ...(navi?['URL:'+navi]:[]),
        ...(rem>0?['BEGIN:VALARM','TRIGGER:-PT'+rem+'M','ACTION:DISPLAY','DESCRIPTION:'+esc(title),'END:VALARM']:[]),
        'END:VEVENT');
    });
    L.push('END:VCALENDAR');
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([L.join('\r\n')],{type:'text/calendar'}));
    a.download='carlon-tagesplan-'+base.toISOString().slice(0,10)+'.ics';a.click();
    if(typeof UI!=='undefined'&&UI.closeModal)UI.closeModal();
    Toast.show(`${rows.length} Termine exportiert — Datei in Apple/Google/Outlook Kalender öffnen`,'ok');
  },
};

/* ── Logbook — Tages-Timesheet, Fahrtenbuch, CSV-Export (Klinik-Zeit/km-Buchhaltung) ── */
const Logbook={
  _t(iso){ if(!iso)return ''; const d=new Date(iso); return fmtTime(d.getHours()*60+d.getMinutes()); },
  _q(v){ return '"'+String(v==null?'':v).replace(/"/g,'""')+'"'; },
  _num(n){ return n==null||n===''?'':String(n).replace('.',','); },
  toCsv(rows){ return '﻿'+rows.map(r=>r.map(c=>this._q(c)).join(';')).join('\r\n'); },
  download(name,content){ const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:'text/csv;charset=utf-8'}));a.download=name;a.click(); },
  dates(){ return [...new Set(State.daylog.map(e=>e.date))].sort().reverse(); },
  forDate(d){
    const s=State.settings; const origin={lat:s.originLat,lng:s.originLng};
    const visits=State.daylog.filter(e=>e.date===d).sort((a,b)=>(a.arriveAt||a.departAt||'').localeCompare(b.arriveAt||b.departAt||''));
    const trips=[]; let prevPlace=s.originLabel||'Praxis', prevPoint=origin;
    visits.forEach(v=>{
      trips.push({from:prevPlace,to:v.place||v.horseName,km:v.driveKm||0,min:v.driveMin||0,purpose:'Besuch '+v.horseName,startAt:null,endAt:v.arriveAt});
      prevPlace=v.place||v.horseName;
      const h=State.horses.find(x=>x.id===v.horseId); if(h&&h.lat!=null)prevPoint={lat:h.lat,lng:h.lng};
    });
    if(visits.length){ const rk=Math.round(haversine(prevPoint,origin)*10)/10; trips.push({from:prevPlace,to:s.originLabel||'Praxis',km:rk,min:Math.round(rk/45*60),purpose:'Rückfahrt Praxis',startAt:visits[visits.length-1].departAt,endAt:null}); }
    const treatMin=visits.reduce((a,v)=>a+(v.treatmentMin||0),0);
    const driveKm=Math.round(trips.reduce((a,t)=>a+(t.km||0),0)*10)/10;
    const driveMin=trips.reduce((a,t)=>a+(t.min||0),0);
    const arr=visits.map(v=>v.arriveAt).filter(Boolean).sort(), dep=visits.map(v=>v.departAt).filter(Boolean).sort();
    const spanMin=(arr.length&&dep.length)?Math.max(0,Math.round((new Date(dep[dep.length-1])-new Date(arr[0]))/60000)):treatMin;
    const revenue=State.consults.filter(c=>(c.date||'').slice(0,10)===d).reduce((a,c)=>a+(c.fee||0),0);
    return {date:d, visits, trips, treatMin, driveKm, driveMin, spanMin, workMin:treatMin+driveMin, revenue};
  },
  exportTimesheet(d){
    const r=this.forDate(d);
    const rows=[['Datum','Ankunft','Abfahrt','Pferd','Halter','Ort','Behandlung (min)','Fahrt (km)','Fahrt (min)','Einstufung','Ist/Schätzung']];
    r.visits.forEach(v=>rows.push([d,this._t(v.arriveAt),this._t(v.departAt),v.horseName,v.owner||'',v.place||'',v.treatmentMin||'',this._num(v.driveKm),v.driveMin||'',(Triage.LEVELS[v.triageLevel]||{}).label||v.triageLevel,v.estimated?'Schätzung':'Ist']));
    rows.push([]); rows.push(['Summe','','','','','',r.treatMin,this._num(r.driveKm),r.driveMin,'','']);
    rows.push(['Besuche',r.visits.length,'Arbeitszeit (min)',r.workMin,'Umsatz (€)',this._num(r.revenue),'','','','','']);
    this.download('carlon-timesheet-'+d+'.csv',this.toCsv(rows));
    Toast.show('Timesheet-CSV exportiert','ok');
  },
  exportFahrtenbuch(d){
    const r=this.forDate(d);
    const rows=[['Datum','Von','Nach','km','Zweck','Uhrzeit']];
    r.trips.forEach(t=>rows.push([d,t.from,t.to,this._num(t.km),t.purpose,this._t(t.endAt||t.startAt)]));
    rows.push([]); rows.push(['Summe km','','',this._num(r.driveKm),'Fahrzeit (min): '+r.driveMin,'']);
    this.download('carlon-fahrtenbuch-'+d+'.csv',this.toCsv(rows));
    Toast.show('Fahrtenbuch-CSV exportiert','ok');
  },
};

const Seed={
  async load(){
    if(!window.CARLON_SEED){Toast.show('Seed-Bibliothek nicht gefunden','warn');return;}
    let cnt=0;
    for(const s of window.CARLON_SEED){
      const n=Normalizer.normalize(s.raw);

      n._seed=s; const r=await Importer.ingest(n); if(!r.dup)cnt++;
    }
    // Historie synthetisieren für lebendige Trends (klar als Demo markiert)
    await Seed.synthHistory();

  // Demo-Umsätze: abrechenbare Ferneinschätzungen über die letzten Wochen — macht die Einnahmequelle sichtbar
  async synthConsults(){
    const horses=State.horses.filter(h=>State.recsFor(h.id).length);
    if(!horses.length)return;
    const types=['Telemetrie-Ferneinschätzung','Verlaufskontrolle HRV','Trainings-/Coaching-Beratung','Zweitmeinung'];
    const fees=[45,60,75,50,65,55];
    const now=new Date(); let seq=0;
    for(let mAgo=5;mAgo>=0;mAgo--){                          // 6 Monate, wachsende Adoption
      const count=Math.max(1,Math.round(2+(5-mAgo)*0.9));    // ~2 → ~6 Beratungen/Monat
      for(let k=0;k<count;k++){
        const h=horses[seq%horses.length];
        const d=new Date(now.getFullYear(),now.getMonth()-mAgo,2+((k*4+mAgo)%25),9+(k%7),(k*13)%60,0);

        const c={id:'c_seed_'+seq,horseId:h.id,date:d.toISOString(),
          type:types[seq%types.length],durationMin:[15,20,25][seq%3],
          fee,notes:'Telemetrie-Ferneinschätzung (Demo)',billed:!(mAgo===0&&k%2===0),report:true};
        await DB.put('consults',c); seq++;

  // Demo-Fahrtenbuch/Zeiterfassung: abgeschlossene Besuchstage mit Fahr-/Behandlungszeiten (Klinik-Vet-Programm sichtbar)
  async synthDaylog(){
    const horses=State.horses.filter(h=>h.lat!=null&&h.lng!=null);
    if(horses.length<4)return;
    const origin={lat:State.settings.originLat,lng:State.settings.originLng};
    const treats=[18,22,25,30,20,24];
    for(let dayOff=1; dayOff<=2; dayOff++){
      const day=new Date(); day.setDate(day.getDate()-dayOff);
      const dateStr=day.toLocaleDateString('en-CA'); // YYYY-MM-DD lokal
      const picks=horses.slice((dayOff-1)*5,(dayOff-1)*5+5); if(!picks.length)break;
      let t=8*60, cur=origin;
      picks.forEach((h,idx)=>{
        const rec=State.latestFor(h.id);
        const driveKm=Math.round(haversine(cur,{lat:h.lat,lng:h.lng})*(Dispatch.ROAD_FACTOR||1.32)*10)/10;
        const driveMin=Math.round(driveKm/45*60); t+=driveMin;
        const arrive=t, treat=treats[idx%treats.length]; t+=treat; const depart=t;
        const mk=min=>{const d=new Date(day); d.setHours(Math.floor(min/60),min%60,0,0); return d.toISOString();};
        const entry={id:'log:'+dateStr+':'+h.id+':'+arrive,date:dateStr,horseId:h.id,horseName:h.name,
          owner:h.owner||'',place:h.place||h.stable||'',arriveAt:mk(arrive),departAt:mk(depart),
          treatmentMin:treat,driveKm,driveMin,triageLevel:(rec?rec.triage.level:'stable'),estimated:false};
        DB.put('settings',entry);
        cur={lat:h.lat,lng:h.lng};
      });
    }
  },
  // Kohärenz-Metriken plausibel aus einem Score (0-100) ableiten
  scoreToRaw(score,date,dur,leads){
    const s=score/100;
    const verdict=score>=62?'COHERENCE':score>=42?'PARTIAL_COHERENCE':'NO_COHERENCE';
    const plv=Math.min(0.78,Math.max(0.008,s*0.72+0.01));
    const chf=Math.min(0.8,Math.max(0.012,s*0.75));
    const clf=Math.min(0.7,Math.max(0.02,s*0.55));
    const z=Math.max(0.1,(score-30)/12);
    const p=score>=60?0.006:score>=48?0.03:score>=42?0.048:0.4;
    const dcab=leads?Math.max(0.004,s*0.5):s*0.25, dcba=leads?s*0.2:s*0.24;
    const dcv=score>=55?(leads?'DC_HORSE_LEADS':'DC_RIDER_LEADS'):score>=42?'DC_SYMMETRIC':'DC_NULL';
    const sync=score>=48?'SYNC_PROVEN':'SYNC_INSUFFICIENT';
    const fire=0.0009+(1-s)*0.004, pair=82+s*15, drift=-(0.3+(1-s)*9), rrd=8+(1-s)*105, rmd=3+(1-s)*45;
    const sha=Math.abs(hashStr(date+score+leads)).toString(16).padStart(8,'0').repeat(8).slice(0,64);
    return {recordingStartedAt:date,recordingDurationSec:dur,measuredAt:date,mode:'live',
      schemaVersion:'carlon-coherent-burst-recording/1.4.0',toolVersion:'carlon-equine.coherent-burst/1.6.0',
      coherenceMetrics:{heartMathPairScore0to100:score,verdict,heartMathRatioHorse:1.0+s*0.5,heartMathRatioHuman:1.1+s*0.4,
        phaseLockingValueHF:plv,spectralCoherenceHF:chf,spectralCoherenceLF:clf,preRegisteredThresholdHF:0.5,
        crossCorrelationRR:(s-0.4)*0.6,crossCorrelationLagMs:Math.round((1-s)*260),directedCoherenceHorseToHumanHF:dcab,directedCoherenceHumanToHorseHF:dcba,
        directedCoherenceVerdict:dcv,directedCoherenceAsymmetryHF:dcab-dcba,susyZ:z,susyPValue:p,
        susyCouplingMode:score>=62?'coupled':score>=42?'weakly_coupled':'independent',susyNSurrogates:500,susyNSegments:26,identitySetupSuspected:false},
      coherentBurst:{fireSkewMs:fire,responseSkewMs:15.9,totalRoundtripMs:74+(1-s)*15,verdictAtStart:'GO',
        salvoSummary:{n:10,medianFireSkewMs:fire,medianTotalRoundtripMs:74+(1-s)*15,bestFireSkewMs:fire*0.4}},
      syncValidation:{verdict:sync,beatPairingPercent:pair,meanRRDeltaMs:rrd,rmssdDeltaMs:rmd,rrStreamDriftMsPerMinute:drift,nBeatsA:1109,nBeatsB:1044},
      hardwareFingerprint:{deviceAliases:['Polar H10 18CE9C3D','Polar H10 1C4D773D'],deviceCount:2},
      integrity:{algorithm:'SHA-256',sha256:sha},
      preRegistrationLock:{preRegFilename:'CarlonEquine/H10LongTerm/WELLE_8_PRE_REGISTRATION.md',preRegSha256:sha}};
  },
  cohDemo(){
    // Drei Paare mit Verlaufsserie (Coaching-Story): Erfolg · langsamer Fortschritt · stagnierend
    const pairs=[
      {beingA:'Bella',beingB:'Reiterin Lena',leads:true, scores:[44,51,58,67,74,78]},   // klarer Coaching-Erfolg
      {beingA:'Apollo',beingB:'Trainer Kai',leads:true, scores:[38,42,45,47,50,53]},  // langsamer, stetiger Fortschritt
      {beingA:'Champion',beingB:'Besitzerin Marion',leads:false, scores:[26,24,29,27,30,31]}, // stagnierend / unabhängig (ehrlich)
    ];
    const out=[]; const startDay=new Date('2026-05-28T10:00:00Z').getTime(); const step=8*86400000;
    pairs.forEach(p=>{

        const date=new Date(startDay+i*step + (p.leads?0:3600000)).toISOString();
        out.push({meta:{beingA:p.beingA,beingB:p.beingB,label:`${p.beingA} ↔ ${p.beingB}`},raw:Seed.scoreToRaw(sc,date,540+i*20,p.leads)});

  async synthAsthma(){
    const map=[['mistral',{triggered:true,severity:'low',criteriaMet:2,criteriaTotal:5,indicators:{sd2_sd1_ratio_low:true,sd2_low:true,rmssd_low:false,sdnn_low:false}}],
      ['stardust',{triggered:true,severity:'moderate',criteriaMet:4,criteriaTotal:5,indicators:{sd2_sd1_ratio_low:true,sd2_low:true,rmssd_low:true,sdnn_low:true}}]];
    for(const [name,screen] of map){
      const h=State.horses.find(x=>(x.name||'').toLowerCase().includes(name));if(!h)continue;

  async loadCoherence(silent){
    let n=0;
    for(const d of Seed.cohDemo()){const r=await Coherence.ingest(d.raw,d.meta);if(!r.dup)n++;}
    if(!silent){await State.load();Nav.refresh();Toast.show(`${n} Demo-Kohärenzmessungen geladen`,'ok');}
  },
  async synthHistory(){
    // Für 3 Pferde einen 4-Punkte-Verlauf erzeugen (verbessernd/verschlechternd/stabil)
    const stories=[
      {match:'mistral',drift:[0.7,0.8,0.9,1.0]},   // Asthma: Erholung
      {match:'tempest',drift:[1.6,1.3,1.1,1.0]},   // Kolik: Verschlechterung bis heute
      {match:'champion',drift:[0.95,1.02,0.98,1.0]},// Senior: stabil
    ];
    for(const st of stories){
      const h=State.horses.find(x=>(x.name||'').toLowerCase().includes(st.match));
      if(!h)continue;const base=State.latestFor(h.id);if(!base)continue;
      const baseDate=new Date(base.startedAt||Date.now());
      for(let i=0;i<st.drift.length-1;i++){
        const d=new Date(baseDate);d.setDate(d.getDate()-(st.drift.length-1-i)*9);
        const f=st.drift[i];
        const metrics={...base.metrics,rmssd:base.metrics.rmssd*f,sdnn:base.metrics.sdnn?base.metrics.sdnn*f:null,
          meanHR:base.metrics.meanHR?base.metrics.meanHR/(0.6+f*0.4):null,
          sd2:base.metrics.sd2?base.metrics.sd2*f:null, sd2sd1:base.metrics.sd2sd1?base.metrics.sd2sd1*(0.72+f*0.28):null};
        const n={metrics,clinical:base.clinical,baselineRMSSD:h.baselineRMSSD};
        const rec={id:'r_hist_'+h.id+'_'+i,horseId:h.id,startedAt:d.toISOString(),durationSec:base.durationSec,
          beatCount:base.beatCount,intent:'rest',metrics,triage:Triage.score(n),clinical:base.clinical,device:base.device,rr:[]};
        if(!State.recordings.some(r=>r.id===rec.id)){await DB.put('recordings',rec);State.recordings.push(rec);}

  // Langzeit-Konditionsaufbau für ein Sport-Pferd: 14 Wochen, Ruhe-HF ↓ + HRV ↑ (Demo)
  async synthConditioning(){
    const h=State.horses.find(x=>(x.name||'').toLowerCase().includes('sunny'));
    if(!h)return; const base=State.latestFor(h.id); if(!base)return;
    const baseDate=new Date(base.startedAt||Date.now());
    for(let i=0;i<13;i++){
      const wk=13-i; const d=new Date(baseDate); d.setDate(d.getDate()-wk*7);
      const f=i/13;

      const rmssd=52+f*28 + 3*Math.sin(i*2.1);        // 52 → 80 ms
      const metrics={...base.metrics,rmssd:Math.round(rmssd*10)/10,meanHR:Math.round(hr*10)/10,
        sdnn:base.metrics.sdnn?Math.round((80+f*60)*10)/10:null,

      const n={metrics,clinical:base.clinical||{},baselineRMSSD:h.baselineRMSSD};
      const rec={id:'r_cnd_'+h.id+'_'+i,horseId:h.id,startedAt:d.toISOString(),durationSec:base.durationSec,
        beatCount:base.beatCount,intent:'rest',metrics,triage:Triage.score(n),clinical:base.clinical||{},device:base.device,rr:[]};
      if(!State.recordings.some(r=>r.id===rec.id)){await DB.put('recordings',rec);State.recordings.push(rec);}

  // Demo: alle überwachten Pferde auf Station aufnehmen, Boxen sequentiell vergeben
  async synthStation(){
    const mon=State.horses.filter(h=>State.latestFor(h.id));

    for(const h of mon){ if(h.onStation)continue; h.onStation=true; if(h.box==null)h.box=box; box++; await DB.put('horses',h); }
  }
};
