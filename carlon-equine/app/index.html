<style>
/* ============================================================================
   CARLON EQUINE — Design-System (CI 1:1 aus carlon-viewer übernommen)
   Void-Schwarz · Marken-Cyan #3ECFB2 · Jost-Wortmarke · Fibonacci-Spacing
   ========================================================================== */
:root{
  --bg-void:#000308; --bg-deep:#02080d; --bg-surface:#06101a; --bg-elev:#0b1a26;
  --bg-elev-2:#14293a; --bg-glass:rgba(11,26,38,.72);
  --border-faint:#102230; --border-subtle:#1b3548; --border-strong:#2a4d65;
  --text-primary:#e8f8ff; --text-secondary:#8aa9bd; --text-dim:#4a6478; --text-faint:#2e4458;
  --cyan:#3ECFB2; --cyan-strong:#6EE6C8; --cyan-deep:#1E8C78;
  --cyan-g1:rgba(62,207,178,.55); --cyan-g2:rgba(62,207,178,.25); --cyan-g3:rgba(62,207,178,.08); --cyan-faint:rgba(62,207,178,.04);
  --good:#3fe0a4; --good-g:rgba(63,224,164,.4);
  --amber:#ffb547; --amber-g:rgba(255,181,71,.4);
  --red:#ff5263; --red-g:rgba(255,82,99,.4);
  --equine:#d4a574;
  --harmony:#8c73f2; --harmony-strong:#a591f7; --harmony-g:rgba(140,115,242,.4); --harmony-g2:rgba(140,115,242,.22); --harmony-faint:rgba(140,115,242,.07);
  --dc-horse:#fa9e52; --dc-human:#6bc7ff;
  --s1:4px; --s2:8px; --s3:13px; --s4:21px; --s5:34px; --s6:55px; --s7:89px;
  --font-brand:"Jost",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --font-ui:"Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --font-mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
  --r-s:8px; --r-m:14px; --r-l:22px;
  --shadow:0 20px 60px -20px rgba(0,0,0,.8);
}
/* ── Feldmodus (Stall/Sonnenlicht): Hochkontrast + größere Touch-Ziele ── */
body.field-mode{
  --text-secondary:#c9dde8; --text-dim:#94b0c2; --text-faint:#6f8ea2;
  --border-faint:#26455a; --border-subtle:#355a72; --border-strong:#4a7288;
  --cyan-g3:rgba(62,207,178,.16);
}
body.field-mode .tact,body.field-mode .rowbtn,body.field-mode .btn,body.field-mode .hbtn,body.field-mode .kpi.act,body.field-mode .viewtoggle button{min-height:52px}
body.field-mode .rowbtn{width:48px}
body.field-mode .tact{padding:14px 16px;font-size:13.5px}
body.field-mode .bottom-nav button{padding:8px 4px}body.field-mode .bottom-nav button svg{width:23px;height:23px}
body.field-mode .tmeta,body.field-mode .hr-name .sub,body.field-mode .hr-vitals .m span{font-size:12.5px}
body.field-mode .tname,body.field-mode .hr-name b{font-size:17px}
body.field-mode .hr-note{font-size:14px;padding:12px 14px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-ui); background:var(--bg-void); color:var(--text-primary);
  -webkit-font-smoothing:antialiased; overflow:hidden; line-height:1.5;
}
/* ===== BACKDROP — 4 Ebenen Atmosphäre (1:1 aus carlon-equine.vitalkultur.com) ===== */
.bg-atmosphere{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 1200px 700px at 50% 130%,rgba(62,207,178,.05) 0%,transparent 60%),
            radial-gradient(ellipse 900px 640px at 4% 46%,rgba(212,165,116,.025) 0%,transparent 60%),
            radial-gradient(ellipse 900px 600px at 96% 8%,rgba(0,184,160,.04) 0%,transparent 55%);}
.bg-flower{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.11;background-position:center top;background-repeat:no-repeat;
  background-size:min(96vh,96vw) auto;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='720' height='720' viewBox='0 0 720 720'><g fill='none' stroke='%233ECFB2' stroke-width='0.5' opacity='1'><circle cx='360' cy='360' r='100'/><circle cx='360' cy='260' r='100'/><circle cx='360' cy='460' r='100'/><circle cx='273' cy='310' r='100'/><circle cx='447' cy='310' r='100'/><circle cx='273' cy='410' r='100'/><circle cx='447' cy='410' r='100'/><circle cx='360' cy='160' r='100'/><circle cx='360' cy='560' r='100'/><circle cx='186' cy='360' r='100'/><circle cx='534' cy='360' r='100'/><circle cx='186' cy='260' r='100'/><circle cx='534' cy='260' r='100'/><circle cx='186' cy='460' r='100'/><circle cx='534' cy='460' r='100'/><circle cx='273' cy='210' r='100'/><circle cx='447' cy='210' r='100'/><circle cx='273' cy='510' r='100'/><circle cx='447' cy='510' r='100'/></g></svg>");}
.bg-scanlines{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(62,207,178,.012) 2px,rgba(62,207,178,.012) 3px);}
.bg-vignette{position:fixed;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse at center,transparent 42%,rgba(0,0,0,.62) 100%);}
#app{position:relative;z-index:2}
::selection{background:var(--cyan-g2);color:#fff}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-subtle);border-radius:6px;border:2px solid var(--bg-void)}
::-webkit-scrollbar-thumb:hover{background:var(--border-strong)}
/* ── Juwel-Foundation: Glas-Tiefe, Fokus, Restraint ── */
:root{ --lift:inset 0 1px 0 rgba(255,255,255,.05); --lift-soft:inset 0 1px 0 rgba(255,255,255,.035); }
.panel,.kpi,.pcard,.tstop,.chart-wrap,.today-log,.baev-box,.pwr,.vm,.detail-owner,.stat,.rec{box-shadow:var(--lift-soft)}
.hero,.tour-card,.today-time input,.rep-bill{box-shadow:var(--lift-soft)}
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{
  outline:2px solid var(--cyan-g2);outline-offset:2px;border-radius:6px}
:focus:not(:focus-visible){outline:none}
/* ── Safe-Banner (Datensicherheit) ── */
.safe-banner{position:sticky;top:0;z-index:60;background:linear-gradient(180deg,rgba(255,181,71,.16),rgba(255,181,71,.09));backdrop-filter:blur(10px);border-bottom:1px solid color-mix(in srgb,var(--amber) 40%,transparent)}
.safe-banner .sb-in{display:flex;align-items:center;gap:11px;max-width:1200px;margin:0 auto;padding:10px 20px;flex-wrap:wrap}
.safe-banner .sb-ic{width:19px;height:19px;color:var(--amber);flex-shrink:0}
.safe-banner .sb-txt{flex:1;min-width:180px;font-size:12.5px;color:var(--text-primary);line-height:1.45}
.safe-banner .sb-txt b{color:var(--amber)}
.safe-banner .sb-btn{padding:8px 14px;border-radius:9px;border:1px solid var(--border-strong);background:var(--bg-elev);color:var(--text-primary);font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.safe-banner .sb-btn.primary{background:var(--amber);border-color:var(--amber);color:var(--bg-void)}
.safe-banner .sb-btn:active{transform:scale(.96)}
.safe-banner .sb-x{flex-shrink:0;width:30px;height:30px;padding:0;display:inline-flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text-dim);cursor:pointer;border-radius:8px;transition:background .15s,color .15s}
.safe-banner .sb-x svg{width:16px;height:16px}
.safe-banner .sb-x:hover{background:color-mix(in srgb,var(--amber) 18%,transparent);color:var(--text-primary)}
.safe-banner.urgent{background:linear-gradient(180deg,rgba(255,82,99,.18),rgba(255,82,99,.10));border-bottom-color:color-mix(in srgb,var(--red) 45%,transparent)}
.safe-banner.urgent .sb-ic,.safe-banner.urgent .sb-txt b{color:var(--red)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--cyan);text-decoration:none}
.mono{font-family:var(--font-mono)}
.hidden{display:none!important}

/* ---- Splash ---- */
#splash{position:fixed;inset:0;z-index:200;background:var(--bg-void);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:var(--s4);transition:opacity .6s ease;}
#splash.gone{opacity:0;pointer-events:none}
#splash img{width:92px;height:92px;filter:drop-shadow(0 0 34px var(--cyan-g1));animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.05);opacity:1}}
#splash .wm{font-family:var(--font-brand);font-weight:400;letter-spacing:.2em;font-size:22px;padding-left:.2em;
  color:var(--text-primary);text-transform:uppercase}
#splash .sub{color:var(--cyan);font-size:11px;letter-spacing:.34em;text-transform:uppercase}
#splash .bar{width:180px;height:2px;background:var(--border-subtle);border-radius:2px;overflow:hidden}
#splash .bar i{display:block;height:100%;width:40%;background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  animation:load 1.1s ease-in-out infinite}
@keyframes load{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}

/* ---- App shell ---- */
#app{display:flex;flex-direction:column;height:100vh;opacity:0;transition:opacity .5s ease}
#app.ready{opacity:1}

header{display:flex;align-items:center;gap:var(--s4);padding:env(safe-area-inset-top,0) var(--s5) 0;
  height:calc(66px + env(safe-area-inset-top,0));flex-shrink:0;
  background:linear-gradient(180deg,rgba(6,16,26,.96),rgba(6,16,26,.82));backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border-faint);position:relative;z-index:50}
header::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan-g2),transparent)}
.brand{display:flex;align-items:center;gap:var(--s3);cursor:pointer;user-select:none}
.brand img{width:34px;height:34px;filter:drop-shadow(0 0 12px var(--cyan-g2))}
.brand .wm{font-family:var(--font-brand);font-weight:500;letter-spacing:.15em;font-size:16px;white-space:nowrap;line-height:1.05}
.beta-pill{display:inline-block;font-family:var(--font-ui);font-size:8.5px;font-weight:700;letter-spacing:.14em;color:var(--bg-void);background:var(--cyan-strong);padding:1px 5px;border-radius:5px;vertical-align:middle;margin-left:4px}
.brand .tag{font-size:8px;letter-spacing:.335em;color:var(--cyan);text-transform:uppercase;margin-top:5px;font-weight:600;white-space:nowrap;line-height:1;padding-left:.02em}
nav.tabs{display:flex;gap:2px;margin-left:var(--s4);background:var(--bg-deep);padding:4px;border-radius:var(--r-m);
  border:1px solid var(--border-faint)}
nav.tabs button{padding:9px 16px;border-radius:10px;font-size:13px;font-weight:500;color:var(--text-secondary);
  display:flex;align-items:center;gap:8px;transition:all .18s ease;position:relative;white-space:nowrap}
nav.tabs button .ic{width:16px;height:16px;opacity:.7}
nav.tabs button:hover{color:var(--text-primary);background:var(--bg-elev)}
nav.tabs button.on{color:var(--bg-void);background:linear-gradient(135deg,var(--cyan-strong),var(--cyan-deep));
  box-shadow:0 4px 16px -4px var(--cyan-g1),inset 0 1px 0 rgba(255,255,255,.3)}
nav.tabs button.on .ic{opacity:1}
nav.tabs button .badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;
  border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;box-shadow:0 0 10px var(--red-g)}
nav.tabs button.on .badge{background:rgba(0,3,8,.35);color:#fff}
.spacer{flex:1}
.hbtn{padding:9px 15px;border-radius:11px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;
  transition:all .18s ease;border:1px solid transparent}
.hbtn.primary{background:linear-gradient(135deg,var(--cyan-strong),var(--cyan-deep));color:var(--bg-void);
  box-shadow:0 4px 18px -6px var(--cyan-g1),inset 0 1px 0 rgba(255,255,255,.35)}
.hbtn.primary:hover{transform:translateY(-1px);box-shadow:0 8px 26px -6px var(--cyan-g1),inset 0 1px 0 rgba(255,255,255,.4)}
.hbtn.ghost{background:var(--bg-elev);border-color:var(--border-subtle);color:var(--text-secondary)}
.hbtn.ghost.on{color:var(--amber);border-color:color-mix(in srgb,var(--amber) 55%,transparent);background:var(--amber-g)}
.hbtn.ghost:hover{color:var(--text-primary);border-color:var(--border-strong);background:var(--bg-elev-2)}
.hbtn svg{width:16px;height:16px}

main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative}
.view{padding:var(--s5) var(--s5) var(--s7);max-width:1480px;margin:0 auto;animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.view-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:var(--s5);gap:var(--s4);flex-wrap:wrap}
.view-head h1{font-family:var(--font-brand);font-weight:600;font-size:30px;letter-spacing:-.01em;display:flex;align-items:center;gap:14px}
.view-head .sub{color:var(--text-secondary);font-size:14px;margin-top:6px;max-width:640px}
.eyebrow{font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--cyan-deep);font-weight:600;margin-bottom:9px;display:block}

/* ---- KPI strip ---- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--s3);margin-bottom:var(--s5)}
.kpi{background:linear-gradient(160deg,rgba(13,29,42,.72),rgba(6,16,26,.64));border:1px solid var(--border-faint);
  border-radius:var(--r-m);padding:var(--s4);position:relative;overflow:hidden;display:block;width:100%;text-align:left;
  font:inherit;color:inherit;-webkit-tap-highlight-color:transparent}
.kpi.act{cursor:pointer;transition:transform .16s cubic-bezier(.2,.8,.2,1),border-color .16s,box-shadow .16s}
.kpi.act:hover{transform:translateY(-2px);border-color:var(--border-strong);box-shadow:0 14px 34px -18px rgba(0,0,0,.9),0 0 0 1px var(--cyan-g3)}
.kpi.act:active{transform:translateY(0) scale(.985)}
.kpi.act:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
.kpi::before{content:"";position:absolute;top:0;left:0;width:3px;height:100%;background:var(--cyan);opacity:.5}
.kpi.red::before{background:var(--red)} .kpi.amber::before{background:var(--amber)} .kpi.good::before{background:var(--good)}
.kpi .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);font-weight:600}
.kpi .val{font-family:var(--font-brand);font-weight:600;font-size:38px;line-height:1.05;margin-top:6px;letter-spacing:-.02em}
.kpi .val small{font-size:15px;color:var(--text-secondary);font-weight:400;margin-left:4px}
.kpi .hint{font-size:12px;color:var(--text-secondary);margin-top:4px}
.kpi .go{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  background:var(--bg-elev);border:1px solid var(--border-faint);color:var(--text-dim);opacity:0;transform:translateX(-3px);transition:opacity .16s,transform .16s,color .16s,background .16s}
.kpi .go svg{width:14px;height:14px}
.kpi.act:hover .go{opacity:1;transform:none;color:var(--cyan-strong);background:var(--cyan-g3)}
@media(hover:none){.kpi .go{opacity:.55;transform:none}}

/* ---- HEUTE · Tages-Cockpit (der 10X-Moment) ---- */
.today-hero{background:linear-gradient(135deg,rgba(62,207,178,.10),rgba(6,16,26,.45));border:1px solid var(--cyan-deep);
  border-radius:var(--r-l);padding:var(--s4) var(--s5);margin-bottom:var(--s4);position:relative;overflow:hidden}
.today-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(600px 200px at 88% -20%,var(--cyan-g2),transparent 70%);pointer-events:none}
.today-hero .th-top{display:flex;align-items:center;justify-content:space-between;gap:var(--s4);flex-wrap:wrap;position:relative}
.today-hero .day .lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);font-weight:600}
.today-hero .day .val{font-family:var(--font-brand);font-weight:600;font-size:19px;margin-top:3px}
.today-hero .th-saved{display:inline-flex;align-items:center;gap:7px;background:var(--cyan-g3);border:1px solid var(--cyan-deep);border-radius:99px;padding:5px 12px 5px 9px}
.today-hero .th-saved svg{width:15px;height:15px;color:var(--cyan-strong)}
.today-hero .th-saved span{font-size:12px;font-weight:600;color:var(--cyan-strong)}
.today-hero .th-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--s3);margin-top:var(--s4);position:relative}
.today-hero .ths{display:flex;flex-direction:column;gap:2px;padding-left:12px;border-left:2px solid var(--border-subtle)}
.today-hero .ths.crit{border-left-color:var(--red)}
.today-hero .ths b{font-family:var(--font-brand);font-weight:600;font-size:26px;line-height:1;letter-spacing:-.02em;color:var(--text-primary)}
.today-hero .ths.crit b{color:var(--red)}
.today-hero .ths b small{font-size:13px;color:var(--text-secondary);font-weight:400}
.today-hero .ths span{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);font-weight:600}
@media(max-width:560px){.today-hero .th-stats{grid-template-columns:repeat(2,1fr);gap:16px 14px}.today-hero .ths b{font-size:24px}}
.tstop{display:flex;gap:var(--s3);align-items:flex-start;background:linear-gradient(160deg,rgba(13,29,42,.72),rgba(6,16,26,.6));
  border:1px solid var(--border-faint);border-left:3px solid var(--cyan);border-radius:var(--r-m);padding:12px var(--s4) 12px 13px;margin-bottom:10px;
  user-select:none;-webkit-user-select:none;cursor:grab}
.tstop.sort-drag,.tstop:active{cursor:grabbing}
.tstop.crit{border-left-color:var(--red)}.tstop.elev{border-left-color:var(--amber)}.tstop.watch{border-left-color:var(--cyan)}.tstop.stable{border-left-color:var(--good)}
.tstop .tord{width:29px;height:29px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-brand);font-weight:600;font-size:15px;color:#fff}
.tstop.crit .tord{background:var(--red);box-shadow:0 0 12px var(--red-g)}.tstop.elev .tord{background:var(--amber);color:var(--bg-void)}.tstop.watch .tord{background:var(--cyan);color:var(--bg-void)}.tstop.stable .tord{background:var(--good);color:var(--bg-void)}
.tstop.late{border-left-color:var(--red)}
.tstop.next{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan-g2),0 6px 20px -8px var(--cyan-g1)}
.tstop.next::after{content:"JETZT DRAN";position:absolute;top:-8px;right:12px;background:var(--cyan);color:var(--bg-void);font-size:9px;font-weight:700;letter-spacing:.08em;padding:2px 8px;border-radius:6px}
.tstop{position:relative}
.tstop.overdue{opacity:.72}
.tstop.overdue .tl-eta{color:var(--amber)!important}
.now-line{display:flex;align-items:center;gap:10px;margin:7px 0;padding-left:9px;position:relative;pointer-events:none}
.now-line .nl-dot{width:13px;height:13px;border-radius:50%;background:var(--red);flex-shrink:0;animation:nowPulse 2.2s ease-in-out infinite}
.now-line .nl-lbl{font-size:11px;font-weight:800;letter-spacing:.11em;color:var(--red);white-space:nowrap;text-transform:uppercase}
.now-line .nl-time{font-family:var(--font-mono);font-size:14px;font-weight:700;margin-left:2px}
.now-line::after{content:"";flex:1;height:2px;background:linear-gradient(90deg,var(--red),color-mix(in srgb,var(--red) 30%,transparent) 60%,transparent);border-radius:2px}
@keyframes nowPulse{0%,100%{box-shadow:0 0 0 3px var(--red-g),0 0 9px var(--red)}50%{box-shadow:0 0 0 8px transparent,0 0 16px var(--red)}}
.today-time .tt-plan{display:inline-flex;align-items:center;gap:5px;font-weight:600;font-size:12px;padding:3px 10px;border-radius:20px}
.today-time .tt-plan svg{width:13px;height:13px}
.today-time .tt-plan.ok{color:var(--good);background:var(--good-g)}
.today-time .tt-plan.behind{color:var(--amber);background:var(--amber-g)}

.pcard{background:linear-gradient(160deg,rgba(13,29,42,.72),rgba(6,16,26,.64));border:1px solid var(--border-subtle);
  border-radius:var(--r-s);padding:var(--s3);margin-bottom:var(--s2);cursor:pointer;transition:all .16s ease;position:relative;overflow:hidden;min-width:0}

b.mdelta{font-variant-numeric:tabular-nums}

  color:var(--text-secondary);border:1px solid var(--border-faint);white-space:nowrap}

/* ---- Cards / panels ---- */
.panel{background:linear-gradient(160deg,rgba(13,29,42,.72),rgba(6,16,26,.64));border:1px solid var(--border-faint);

/* ---- Pferde-Listenansicht ---- */

.viewtoggle svg{width:15px;height:15px}
.list-head{display:none}
@media(max-width:560px){.hrow .hr-vitals,.hrow .actions{padding-left:0}.hrow .hr-vitals{gap:16px}.hrow .hr-last{margin-left:0;width:100%}}

.tools{display:flex;gap:var(--s2);margin-bottom:var(--s4);flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:220px;position:relative}
.search input{width:100%;padding:11px 14px 11px 40px;background:var(--bg-deep);border:1px solid var(--border-subtle);
  border-radius:var(--r-m);color:var(--text-primary);outline:none;transition:border .16s}
.search input:focus{border-color:var(--cyan-deep);box-shadow:0 0 0 3px var(--cyan-g3)}
.search svg{position:absolute;left:13px;top:20px;transform:translateY(-50%);width:17px;height:17px;color:var(--text-dim)}
.search-suggest{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:70;background:var(--bg-elev-2);border:1px solid var(--border-strong);border-radius:12px;box-shadow:0 20px 50px -18px rgba(0,0,0,.85);overflow:hidden;display:none;max-height:340px;overflow-y:auto}
.search-suggest.on{display:block;animation:fade .14s ease}
.ss-item{display:flex;align-items:center;gap:11px;padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--border-faint)}
.ss-item:last-child{border-bottom:0}
.ss-item:hover,.ss-item.active{background:var(--cyan-faint)}
.ss-item .ss-txt{flex:1;min-width:0}
.ss-item .ss-txt b{display:block;font-size:14px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss-item .ss-txt span{display:block;font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss-item .ss-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ss-item .ss-dot.crit{background:var(--red)}.ss-item .ss-dot.elev{background:var(--amber)}.ss-item .ss-dot.watch{background:var(--cyan)}.ss-item .ss-dot.stable{background:var(--good)}
.ss-empty{padding:14px;text-align:center;font-size:12.5px;color:var(--text-dim)}
.seg{display:flex;background:var(--bg-deep);border:1px solid var(--border-faint);border-radius:var(--r-m);padding:3px}
.seg button{padding:8px 13px;font-size:12px;font-weight:600;border-radius:9px;color:var(--text-secondary)}
.seg button.on{background:var(--bg-elev-2);color:var(--text-primary)}

/* ---- Detail ---- */
.detail-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:var(--s4);align-items:start}
.subject-hero{display:flex;align-items:center;gap:var(--s4);margin-bottom:var(--s4);flex-wrap:wrap}
.avatar{width:74px;height:74px;border-radius:20px;background:linear-gradient(135deg,var(--bg-elev-2),var(--bg-surface));
  border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-family:var(--font-brand);
  font-size:30px;font-weight:600;color:var(--cyan-strong);flex-shrink:0}
/* ---- Pferde-Avatar (Horse-Head-SVG oder echtes Foto, rund) ---- */
.horse-av{border-radius:50%;background:radial-gradient(125% 125% at 30% 22%,color-mix(in srgb,var(--coat,#7d8a99) 30%,var(--bg-surface)),var(--bg-void));
  border:1.5px solid color-mix(in srgb,var(--coat,#7d8a99) 72%,transparent);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;position:relative;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 1px 3px rgba(0,0,0,.35)}
.horse-av img{width:100%;height:100%;object-fit:cover;display:block}
.horse-av .mono{font-family:var(--font-brand);font-weight:600;line-height:1;letter-spacing:.01em;
  color:color-mix(in srgb,var(--coat,#9aa7b0) 88%,#fff);text-shadow:0 1px 3px rgba(0,0,0,.5)}
.horse-av svg{width:60%;height:60%;color:var(--coat,#9aa7b0)}
.horse-av.clickable{cursor:pointer;transition:border-color .16s,box-shadow .16s,transform .16s}
.horse-av.clickable:hover{box-shadow:0 0 0 3px color-mix(in srgb,var(--coat,#3ECFB2) 30%,transparent);transform:scale(1.04)}
.horse-av .cam{position:absolute;inset:0;background:rgba(2,8,13,.66);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .16s}
.horse-av.clickable:hover .cam{opacity:1}
.horse-av .cam svg{width:34%;height:34%;color:var(--cyan-strong)}
.tri-badge{padding:7px 15px;border-radius:11px;font-size:13px;font-weight:700;letter-spacing:.02em;display:inline-flex;align-items:center;gap:8px}
.tri-badge .dot{width:9px;height:9px;border-radius:50%}
.tri-crit{background:rgba(255,82,99,.13);color:#ff8a95;border:1px solid rgba(255,82,99,.35)}.tri-crit .dot{background:var(--red);box-shadow:0 0 10px var(--red-g)}
.tri-elev{background:rgba(255,181,71,.13);color:var(--amber);border:1px solid rgba(255,181,71,.35)}.tri-elev .dot{background:var(--amber)}
.tri-watch{background:var(--cyan-faint);color:var(--cyan-strong);border:1px solid var(--cyan-g2)}.tri-watch .dot{background:var(--cyan)}
.tri-stable{background:rgba(63,224,164,.12);color:var(--good);border:1px solid rgba(63,224,164,.32)}.tri-stable .dot{background:var(--good)}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--s2);margin:var(--s4) 0}
.stat{background:var(--bg-deep);border:1px solid var(--border-faint);border-radius:var(--r-s);padding:var(--s3)}
.stat .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);font-weight:600}
.stat .v{font-family:var(--font-mono);font-size:22px;font-weight:600;margin-top:4px;letter-spacing:-.02em}
.stat .v small{font-size:12px;color:var(--text-secondary);font-weight:400}
.stat .cls{font-size:11px;margin-top:2px;font-weight:600}
.stat .v.na,.vm .v .na{color:var(--text-faint);font-weight:500}
.stat .v.na{font-size:16px}
.cls.good{color:var(--good)} .cls.warn{color:var(--amber)} .cls.alert{color:var(--red)}

.rec-list{display:flex;flex-direction:column;gap:6px}
.rec{display:flex;align-items:center;gap:var(--s3);padding:11px 13px;background:var(--bg-deep);border:1px solid var(--border-faint);
  border-radius:var(--r-s);transition:border .14s}
.rec:hover{border-color:var(--border-subtle)}
.rec .rdate{font-size:13px;font-weight:600;min-width:118px}
.rec .rmeta{font-size:11px;color:var(--text-dim)}
.rec .rmini{margin-left:auto;display:flex;gap:14px}
.rec .rmini .m{text-align:right}
.rec .rmini .m b{font-family:var(--font-mono);font-size:14px}
.rec .rmini .m b svg,.m b svg{width:15px;height:15px}
.rec .rmini .m span{font-size:9px;color:var(--text-dim);display:block;text-transform:uppercase;letter-spacing:.06em}
.icon-btn{width:30px;height:30px;border-radius:8px;background:var(--bg-elev);border:1px solid var(--border-faint);
  display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all .14s}
.icon-btn:hover{color:var(--text-primary);border-color:var(--border-strong);background:var(--bg-elev-2)}
.icon-btn svg{width:15px;height:15px}

/* ---- Consult ledger ---- */
.ledger{width:100%;border-collapse:collapse}
.ledger th{text-align:left;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);
  font-weight:600;padding:8px 12px;border-bottom:1px solid var(--border-faint)}
.ledger td{padding:11px 12px;border-bottom:1px solid var(--border-faint);font-size:13px}
.ledger tr:hover td{background:var(--bg-deep)}
.ledger .amt{font-family:var(--font-mono);font-weight:600;text-align:right}
.pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.pill.paid{background:rgba(63,224,164,.14);color:var(--good)}
.pill.open{background:rgba(255,181,71,.14);color:var(--amber)}

/* ---- Map ---- */
.dispatch{display:grid;grid-template-columns:1fr 380px;gap:var(--s4);height:calc(100vh - 220px);min-height:520px}
#map{border-radius:var(--r-l);overflow:hidden;border:1px solid var(--border-subtle);background:var(--bg-deep);height:100%;position:relative}
.map-controls{position:absolute;top:12px;right:12px;z-index:500;display:flex;gap:8px}
.map-ctrl{display:inline-flex;align-items:center;gap:6px;padding:9px 13px;border-radius:10px;background:var(--bg-glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--border-strong);color:var(--text-primary);font-size:12.5px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px -4px rgba(0,0,0,.5)}
.map-ctrl svg{width:15px;height:15px;color:var(--text-secondary)}
.map-ctrl.on{background:var(--cyan-g3);border-color:var(--cyan);color:var(--cyan-strong)}
.map-ctrl.on svg{color:var(--cyan-strong)}
.leaflet-container{background:#0a1a26!important;font-family:var(--font-ui)}
.leaflet-tile{filter:brightness(1.55) contrast(1.02) saturate(1.12)}
.leaflet-control-zoom a{background:rgba(9,22,33,.92)!important;color:var(--text-primary)!important;border-color:var(--border-subtle)!important}
.leaflet-popup-content-wrapper{background:var(--bg-elev);color:var(--text-primary);border:1px solid var(--border-strong);border-radius:12px}
.leaflet-popup-tip{background:var(--bg-elev)}
.route-panel{display:flex;flex-direction:column;background:var(--bg-deep);border:1px solid var(--border-faint);
  border-radius:var(--r-l);overflow:hidden}
.route-panel .rp-head{padding:var(--s4);border-bottom:1px solid var(--border-faint)}
.route-panel .rp-body{flex:1;overflow-y:auto;padding:var(--s3)}
.stop{display:flex;gap:var(--s3);padding:12px 13px;border-radius:var(--r-m);margin-bottom:7px;background:var(--bg-elev);
  border:1px solid var(--border-faint);border-left:3px solid var(--border-strong);align-items:flex-start;cursor:pointer;transition:border-color .15s,background .15s;position:relative}
.stop:hover{border-color:var(--border-strong);background:var(--bg-elev-2)}
.stop.crit{border-left-color:var(--red)}.stop.elev{border-left-color:var(--amber)}.stop.watch{border-left-color:var(--cyan)}.stop.stable{border-left-color:var(--good)}
.stop .ord{width:27px;height:27px;border-radius:50%;background:var(--bg-elev-2);border:1px solid var(--border-strong);margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:13px;flex-shrink:0;position:relative}
.stop .ord::after{content:'';position:absolute;top:calc(100% + 1px);left:50%;transform:translateX(-50%);width:2px;height:calc(100% + 20px);background:linear-gradient(var(--border-subtle),transparent);z-index:0}
.stop:last-child .ord::after{display:none}
.stop.crit .ord{background:var(--red);color:#fff;border-color:var(--red)}
.stop.elev .ord{background:var(--amber);color:var(--bg-void);border-color:var(--amber)}
.stop.watch .ord{background:var(--cyan);color:var(--bg-void);border-color:var(--cyan)}
.stop.stable .ord{background:var(--good);color:var(--bg-void);border-color:var(--good)}
.stop .sinfo{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.stop .sinfo>b{font-size:14.5px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stop .stri{font-size:10px;font-weight:700;padding:1px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:4px}
.stop .stri .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.stop .stri.tri-crit{background:var(--red-g);color:var(--red)}.stop .stri.tri-elev{background:var(--amber-g);color:var(--amber)}.stop .stri.tri-watch{background:var(--cyan-g3);color:var(--cyan-strong)}.stop .stri.tri-stable{background:var(--good-g);color:var(--good)}
.stop .sowner{font-size:12.5px;color:var(--text-dim);display:flex;align-items:center;gap:6px;min-width:0}
.stop .sowner svg{width:13px;height:13px;flex-shrink:0}
.stop .sowner .sow-txt{display:flex;flex-direction:column;min-width:0;line-height:1.25}
.stop .sowner b{color:var(--text-primary);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop .sowner em{font-style:normal;color:var(--text-dim);font-variant-numeric:tabular-nums}
.stop .splace{font-size:11.5px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop .splace b{color:var(--text-secondary);font-weight:600;font-family:var(--font-mono)}
.stop .sright{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.stop .sdist{font-size:12px;color:var(--text-secondary);font-family:var(--font-mono);font-weight:600;white-space:nowrap}
.stop .sact{display:flex;gap:6px}
.stop .sact .rowbtn{width:32px;height:32px}
.stop .stime{display:flex;flex-direction:column;align-items:flex-start;min-width:50px;flex-shrink:0;padding-top:1px}
.stop .stime>b{font-family:var(--font-mono);font-size:15px;font-weight:700;color:var(--text-primary);font-variant-numeric:tabular-nums;line-height:1.05}
.stop .stime>span{font-size:10px;color:var(--text-dim);margin-top:2px;white-space:nowrap}
.stop.islate{border-left-color:var(--amber)}
.stop .sflag{font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px;margin-top:1px}
.stop .sflag svg{width:12px;height:12px}
.stop .sflag.late{color:var(--amber)}
.stop .sflag.wait{color:var(--text-dim)}
.stop .sflag.ok{color:var(--good)}
.route-stats{font-size:12px;color:var(--text-secondary);margin-top:7px;line-height:1.55}
.route-stats b{color:var(--text-primary);font-weight:600;font-variant-numeric:tabular-nums}
.route-stats .rs-late{color:var(--amber);font-weight:700}
.detail-owner{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:12px;padding:10px 12px;background:var(--bg-elev);border:1px solid var(--border-subtle);border-radius:12px;max-width:440px}
.detail-owner .do-id{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.detail-owner .do-id>svg{width:16px;height:16px;color:var(--text-dim);flex-shrink:0}
.detail-owner .do-txt{display:flex;flex-direction:column;min-width:0;line-height:1.25}
.detail-owner .do-txt b{color:var(--text-primary);font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail-owner .do-txt span{font-size:11.5px;color:var(--text-dim)}
.detail-owner .do-call{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:10px;background:var(--good-g);border:1px solid var(--good);color:var(--good);font-weight:600;font-size:13.5px;font-variant-numeric:tabular-nums;flex-shrink:0;transition:all .14s}
.detail-owner .do-call>svg{width:15px;height:15px}
.detail-owner .do-call:hover{background:var(--good);color:var(--bg-void)}
.ref-lines{display:flex;flex-direction:column;gap:11px;font-size:14px}
.ref-lines>div{display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-width:0}
.ref-lines>div>span{color:var(--text-dim);font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;min-width:62px;flex-shrink:0}
.ref-lines>div>b{color:var(--text-primary);font-weight:600;min-width:0}
.ref-navi{margin-left:auto;display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:9px;background:var(--cyan-faint);border:1px solid var(--cyan-g2);color:var(--cyan-strong);font-size:12.5px;font-weight:600;flex-shrink:0;box-shadow:var(--lift-soft)}
.ref-navi svg{width:14px;height:14px}
.ref-navi:hover{background:var(--cyan-g3);border-color:var(--cyan)}
.mappop{min-width:180px}
.mappop .mp-h{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.mappop .mp-ord{width:22px;height:22px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:var(--font-mono)}
.mappop .mp-ord.tri-crit{background:var(--red)}.mappop .mp-ord.tri-elev{background:var(--amber);color:#08121a}.mappop .mp-ord.tri-watch{background:var(--cyan);color:#08121a}.mappop .mp-ord.tri-stable{background:var(--good);color:#08121a}
.mappop .mp-h b{font-size:15px}
.mappop .mp-tri{font-size:11px;font-weight:700;margin-bottom:7px}
.mappop .mp-tri.tri-crit{color:var(--red)}.mappop .mp-tri.tri-elev{color:var(--amber)}.mappop .mp-tri.tri-watch{color:var(--cyan-strong)}.mappop .mp-tri.tri-stable{color:var(--good)}
.mappop .mp-row{font-size:12px;color:var(--text-secondary);margin:2px 0}
.mappop .mp-row b{color:var(--text-dim);font-weight:600}
.mappop .mp-act{display:flex;gap:10px;margin-top:9px}
.mappop .mp-act a{font-size:12px;font-weight:600;color:var(--cyan-strong);text-decoration:none;padding:5px 11px;border:1px solid var(--cyan-deep);border-radius:8px}
.mappop .mp-act a:hover{background:var(--cyan-g3)}
.be{text-align:center;flex-shrink:0;width:78px}
.be-av{width:50px;height:50px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;border:1.5px solid}
.be-av.horse{background:color-mix(in srgb,var(--equine) 22%,var(--bg-surface));border-color:var(--equine);color:var(--equine)}
.be-av.rider{background:var(--cyan-g3);border-color:var(--cyan-deep);color:var(--cyan-strong)}
.be-av svg{width:28px;height:28px}
.be-role{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);font-weight:700;margin-top:6px}
.be-name{font-size:12px;color:var(--text-secondary);font-weight:600;margin-top:1px;word-break:break-word;line-height:1.25}
.mapfallback{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:14px;
  color:var(--text-dim);text-align:center;padding:40px}

/* ---- Buttons general ---- */
.btn{padding:11px 18px;border-radius:var(--r-m);font-size:14px;font-weight:600;display:inline-flex;align-items:center;
  gap:9px;transition:all .18s ease;justify-content:center}
.btn.primary{background:linear-gradient(135deg,var(--cyan-strong),var(--cyan-deep));color:var(--bg-void);
  box-shadow:0 5px 20px -6px var(--cyan-g1),inset 0 1px 0 rgba(255,255,255,.35)}
.btn.primary:hover{transform:translateY(-1px);box-shadow:0 10px 30px -8px var(--cyan-g1)}
.btn.primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn.ghost{background:var(--bg-elev);border:1px solid var(--border-subtle);color:var(--text-secondary)}
.btn.ghost:hover{color:var(--text-primary);border-color:var(--border-strong)}
.btn.gmaps{background:linear-gradient(135deg,var(--cyan-strong),var(--cyan-deep));color:var(--bg-void);font-weight:700;box-shadow:0 6px 22px -6px var(--cyan-g1),inset 0 1px 0 rgba(255,255,255,.35)}
.btn.gmaps:hover{transform:translateY(-1px);box-shadow:0 10px 28px -6px var(--cyan-g1),inset 0 1px 0 rgba(255,255,255,.4)}
.btn.gmaps svg{width:16px;height:16px}
.btn svg{width:17px;height:17px}
.btn.block{width:100%}

/* ---- Empty state ---- */
.empty-state{text-align:center;padding:var(--s7) var(--s4);max-width:560px;margin:0 auto}
.empty-state .ic{width:64px;height:64px;margin:0 auto var(--s4);color:var(--text-dim);opacity:.5}
.empty-state h3{font-family:var(--font-brand);font-size:22px;font-weight:600;margin-bottom:10px}
.empty-state p{color:var(--text-secondary);margin-bottom:var(--s4)}

/* ---- Modal ---- */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(0,2,6,.72);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;padding:var(--s4);animation:fade .25s ease}
.modal{background:linear-gradient(160deg,rgba(13,29,42,.82),rgba(6,16,26,.76));border:1px solid var(--border-strong);
  border-radius:var(--r-l);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;
  box-shadow:0 40px 90px -30px rgba(0,0,0,.85),var(--lift);backdrop-filter:blur(16px) saturate(1.1);animation:pop .3s cubic-bezier(.2,.9,.3,1.2)}
.modal.wide{max-width:720px}
@keyframes pop{from{opacity:0;transform:scale(.94) translateY(12px)}to{opacity:1;transform:none}}
.modal-head{padding:var(--s4) var(--s5);border-bottom:1px solid var(--border-faint);display:flex;align-items:center;justify-content:flex-start;gap:var(--s3)}
.modal-head .closex{order:-1}
.modal-head h3{font-family:var(--font-brand);font-size:20px;font-weight:600}
.modal-body{padding:var(--s5)}
.modal-foot{padding:var(--s4) var(--s5);border-top:1px solid var(--border-faint);display:flex;gap:var(--s2);justify-content:flex-end}
.field{margin-bottom:var(--s4)}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:7px;letter-spacing:.02em}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;background:var(--bg-deep);border:1px solid var(--border-subtle);
  border-radius:var(--r-s);color:var(--text-primary);outline:none;transition:border .16s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cyan-deep);box-shadow:0 0 0 3px var(--cyan-g3)}
.field .hint{font-size:11px;color:var(--text-dim);margin-top:5px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--s3)}
/* ── Recents-Chips (Roster) ── */
.recents-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 14px}
.recents-row .rr-lbl{display:inline-flex;align-items:center;gap:5px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);font-weight:700}
.recents-row .rr-lbl svg{width:12px;height:12px}
.rr-chip{display:inline-flex;align-items:center;gap:7px;padding:5px 12px 5px 5px;border-radius:999px;background:var(--bg-elev);border:1px solid var(--border-subtle);color:var(--text-primary);font-size:13px;font-weight:600;box-shadow:var(--lift-soft);position:relative;transition:all .14s}
.rr-chip:hover{border-color:var(--cyan-g2);transform:translateY(-1px)}
.rr-chip .rr-dot{width:6px;height:6px;border-radius:50%}
.rr-chip .rr-dot.crit{background:var(--red)}.rr-chip .rr-dot.elev{background:var(--amber)}.rr-chip .rr-dot.watch{background:var(--cyan)}.rr-chip .rr-dot.stable{background:var(--good)}
/* ── ⋯ Quick-Action-Trigger ── */
.pcard .pc-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.qa-btn{width:28px;height:28px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:var(--text-dim);border:1px solid transparent;flex-shrink:0}
.qa-btn:hover{color:var(--text-primary);background:var(--bg-elev-2);border-color:var(--border-subtle)}
.qa-btn svg{width:18px;height:18px}
/* ── Action-Sheet ── */
.modal.sheet{max-width:420px}
.qa .qa-head{display:flex;align-items:center;gap:12px;padding:18px 20px 16px;border-bottom:1px solid var(--border-faint)}
.qa .qa-id{flex:1;min-width:0}
.qa .qa-id b{font-family:var(--font-brand);font-size:17px;font-weight:600;display:block}
.qa .qa-id span{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.qa .qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:18px 20px 20px}
.qa-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:16px 10px;border-radius:14px;background:var(--bg-deep);border:1px solid var(--border-subtle);color:var(--text-secondary);font-size:13px;font-weight:600;box-shadow:var(--lift-soft);transition:all .15s}
.qa-item:hover{color:var(--text-primary);border-color:var(--border-strong);transform:translateY(-1px)}
.qa-item svg{width:22px;height:22px}
.qa-item.primary{background:var(--good-g);border-color:var(--good);color:var(--good)}
.qa-item.call{color:var(--good)}
/* ── Pass 3: Motion & Mikro-Interaktionen ── */
@media(prefers-reduced-motion:no-preference){
  .btn,.tact,.rowbtn,.kpi.act,.qa-item,.feechip,.rr-chip,.hbtn,.pcard,.tier-pill,.viewtoggle button,.seg button,.icon-btn{transition:transform .13s cubic-bezier(.2,.8,.2,1),border-color .16s,background .16s,box-shadow .18s,color .16s}
  .btn:active,.tact:active,.rowbtn:active,.kpi.act:active,.qa-item:active,.feechip:active,.rr-chip:active,.hbtn:active,.icon-btn:active,.tier-pill:active{transform:scale(.96)}
  .pcard:active{transform:scale(.99)}
}
@media(prefers-reduced-motion:reduce){ *,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important} }
/* Bottom-Sheet auf Mobile (native iOS-Anmutung) */
@keyframes sheetUp{from{opacity:0;transform:translateY(44px)}to{opacity:1;transform:none}}
@media(max-width:560px){
  .modal-bg:has(.sheet){align-items:flex-end;padding:0}
  .modal.sheet{width:100%;max-width:100%;border-radius:20px 20px 0 0;animation:sheetUp .3s cubic-bezier(.2,.9,.3,1)}
  .qa .qa-grid{padding-bottom:calc(20px + env(safe-area-inset-bottom,0))}
}
/* ── Pass 4: Empty States ── */
.empty-state{display:flex;flex-direction:column;align-items:center;text-align:center;padding:56px 24px;color:var(--text-dim)}
.empty-state>svg{width:38px;height:38px;color:var(--text-faint);margin-bottom:16px;opacity:.75}
.empty-state .es-t{font-family:var(--font-brand);font-size:17px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
.empty-state .es-h{font-size:13px;max-width:330px;line-height:1.55}
.rep-intro{display:flex;gap:11px;align-items:flex-start;font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0 0 16px;padding:12px 14px;background:var(--cyan-faint);border:1px solid var(--cyan-g2);border-radius:10px}
.rep-intro>svg{width:20px;height:20px;color:var(--good);flex-shrink:0;margin-top:1px}
.rep-bill{margin-top:8px;padding:14px;border:1px solid var(--cyan-g2);border-radius:12px;background:var(--bg-deep)}
.rep-bill-h{display:flex;align-items:center;gap:9px;font-weight:600;font-size:14px;cursor:pointer;margin-bottom:12px}
.rep-bill-h input{width:auto;accent-color:var(--good)}
.fee-chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.feechip{padding:9px 14px;border-radius:9px;border:1px solid var(--border-subtle);background:var(--bg-elev);color:var(--text-secondary);font-weight:600;font-size:14px;cursor:pointer;transition:all .14s}
.feechip:hover{border-color:var(--cyan-g2);color:var(--text-primary)}
.feechip.on{background:var(--good-g);border-color:var(--good);color:var(--good)}
.fee-chips input{width:96px;flex-shrink:0}
.rep-chk{display:flex;align-items:center;gap:9px;font-size:13px;cursor:pointer;margin-top:11px;color:var(--text-secondary)}
.rep-chk input{width:auto;accent-color:var(--cyan)}
.closex{width:34px;height:34px;border-radius:10px;background:var(--bg-deep);border:1px solid var(--border-faint);
  display:flex;align-items:center;justify-content:center;color:var(--text-secondary)}
.closex:hover{color:var(--text-primary);border-color:var(--border-strong)}
.closex svg{width:16px;height:16px}

/* ---- Dropzone ---- */
.dropzone{border:2px dashed var(--border-strong);border-radius:var(--r-l);padding:var(--s6) var(--s4);text-align:center;
  transition:all .2s ease;background:var(--bg-deep);cursor:pointer}
.dropzone.hot{border-color:var(--cyan);background:var(--cyan-faint);box-shadow:inset 0 0 40px var(--cyan-g3)}
.dropzone .dz-ic{width:52px;height:52px;margin:0 auto var(--s3);color:var(--cyan);opacity:.8}
.dropzone h4{font-size:17px;font-weight:600;margin-bottom:8px}
.dropzone p{color:var(--text-secondary);font-size:13px}
.dropzone .formats{margin-top:14px;font-size:11px;color:var(--text-dim);letter-spacing:.04em}
.import-log{margin-top:var(--s4);display:flex;flex-direction:column;gap:5px;max-height:260px;overflow-y:auto}
.ilog{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-s);font-size:12.5px;background:var(--bg-deep);border:1px solid var(--border-faint)}
.ilog .st{width:18px;height:18px;flex-shrink:0}
.ilog.ok{border-color:rgba(63,224,164,.25)} .ilog.ok .st{color:var(--good)}
.ilog.dup .st{color:var(--text-dim)}
.ilog.err{border-color:rgba(255,82,99,.25)} .ilog.err .st{color:var(--red)}
.ilog .fn{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ilog .msg{color:var(--text-dim);font-size:11px}
.import-summary{margin-top:var(--s4);padding:var(--s3) var(--s4);background:var(--cyan-faint);border:1px solid var(--cyan-g2);
  border-radius:var(--r-m);font-size:13px;display:flex;gap:var(--s4);align-items:center;flex-wrap:wrap}
.import-summary b{color:var(--cyan-strong);font-size:20px;font-family:var(--font-brand)}
/* ---- Import-Vorschau (Ordner-Ansicht) ---- */
.imp-scan{display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px 20px;color:var(--text-secondary)}
.imp-scan .spin{width:38px;height:38px;border:3px solid var(--border-subtle);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.imp-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:var(--s4)}
.imp-stat{background:var(--bg-deep);border:1px solid var(--border-faint);border-radius:var(--r-s);padding:11px 13px;text-align:center}
.imp-stat b{font-family:var(--font-brand);font-size:24px;font-weight:600;display:block;line-height:1}
.imp-stat span{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);margin-top:4px;display:block}
.imp-stat.new b{color:var(--cyan-strong)} .imp-stat.dup b{color:var(--text-secondary)} .imp-stat.skip b{color:var(--amber)}
.imp-groups{display:flex;flex-direction:column;gap:9px;max-height:340px;overflow-y:auto;padding-right:4px}
.fcard{background:linear-gradient(160deg,rgba(13,29,42,.72),rgba(6,16,26,.64));border:1px solid var(--border-subtle);border-radius:var(--r-m);overflow:hidden}
.fcard .fhead{display:flex;align-items:center;gap:12px;padding:12px 14px}
.fcard .ficon{width:36px;height:36px;border-radius:10px;background:var(--bg-elev-2);border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;color:var(--cyan);flex-shrink:0}
.fcard.new .ficon{background:var(--cyan-faint);border-color:var(--cyan-g2)}
.fcard .fmeta{flex:1;min-width:0}
.fcard .fmeta b{font-size:14px}.fcard .fmeta span{font-size:11px;color:var(--text-dim);display:block}
.fcard .fbadge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:7px;white-space:nowrap}
.fbadge.new{background:var(--cyan-faint);color:var(--cyan-strong);border:1px solid var(--cyan-g2)}
.fbadge.exist{background:var(--bg-elev-2);color:var(--text-secondary)}
.fbadge.coh{background:rgba(212,165,116,.14);color:var(--equine)}
.fcard .frecs{border-top:1px solid var(--border-faint);padding:6px 14px 10px}
.frec{display:flex;align-items:center;gap:10px;font-size:12px;padding:4px 0;color:var(--text-secondary)}
.frec .fdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.frec.dupd{opacity:.5}.frec .fspacer{margin-left:auto;font-size:11px}
.frec .ftag{font-size:10px;font-weight:600;padding:1px 7px;border-radius:6px}
.imp-skip{margin-top:var(--s3)}
.imp-skip summary{font-size:12px;color:var(--text-dim);cursor:pointer;padding:8px 0}
.imp-skip .sk{font-size:11px;color:var(--text-dim);padding:4px 12px;display:flex;gap:10px;border-left:2px solid var(--border-subtle);margin-bottom:3px}
.imp-progress{height:6px;background:var(--bg-deep);border-radius:4px;overflow:hidden;margin:var(--s3) 0}
.imp-progress i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan-deep),var(--cyan));width:0;transition:width .2s}
.imp-done{text-align:center;padding:30px 20px}
.imp-done .big{width:60px;height:60px;border-radius:50%;background:var(--cyan-faint);border:1px solid var(--cyan-g2);color:var(--good);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.imp-done .big svg{width:30px;height:30px}

/* ---- Toast ---- */
#toasts{position:fixed;bottom:24px;right:24px;z-index:150;display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.toast{background:var(--bg-elev-2);border:1px solid var(--border-strong);border-radius:var(--r-m);padding:13px 18px;
  font-size:13px;font-weight:500;box-shadow:var(--shadow);display:flex;align-items:center;gap:11px;animation:slidein .3s ease;max-width:380px}
.toast .st{width:19px;height:19px;flex-shrink:0}
.toast-act{margin-left:6px;flex-shrink:0;padding:7px 13px;border-radius:9px;background:var(--cyan-faint);border:1px solid var(--cyan-g2);color:var(--cyan-strong);font-weight:700;font-size:12.5px;cursor:pointer}
.toast-act:hover{background:var(--cyan);color:var(--bg-void)}
.toast.ok{border-left:3px solid var(--good)} .toast.ok .st{color:var(--good)}
.toast.info{border-left:3px solid var(--cyan)} .toast.info .st{color:var(--cyan)}
.toast.warn{border-left:3px solid var(--amber)} .toast.warn .st{color:var(--amber)}
@keyframes slidein{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}

/* ---- Charts ---- */
.chart-wrap{background:var(--bg-deep);border:1px solid var(--border-faint);border-radius:var(--r-m);padding:var(--s4);margin-bottom:var(--s3)}
.ct{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--text-secondary)}
.chart-wrap .ct{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.info-i{width:19px;height:19px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:var(--text-dim);border:1px solid var(--border-subtle);background:var(--bg-elev);flex-shrink:0;cursor:pointer;padding:0}
.info-i svg{width:12px;height:12px}
.info-i:hover{color:var(--cyan-strong);border-color:var(--cyan-g2);background:var(--cyan-faint)}
.info-pop .ip-head{display:flex;align-items:center;gap:10px;padding:18px 20px 12px;border-bottom:1px solid var(--border-faint)}
.info-pop .ip-head>svg{width:20px;height:20px;color:var(--cyan-strong);flex-shrink:0}
.info-pop .ip-head h3{font-family:var(--font-brand);font-size:18px;font-weight:600}
.info-pop .ip-body{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.ip-row{display:grid;grid-template-columns:84px 1fr;gap:12px;font-size:13.5px;line-height:1.55}
.ip-row>b{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);font-weight:700;padding-top:2px}
.ip-row>span{color:var(--text-secondary)}
.ip-row.eq>b{color:var(--equine)}
.ip-ref{font-size:11.5px;color:var(--text-faint);font-style:italic;border-top:1px solid var(--border-faint);padding-top:10px}
.info-pop .ip-foot{padding:2px 20px 18px;display:flex;justify-content:flex-end}
.chart-wrap .ct .leg{font-size:10px;color:var(--text-dim);display:flex;gap:12px}
.chart-wrap .ct .leg i{display:inline-flex;align-items:center;gap:5px}
.chart-wrap .ct .leg i::before{content:"";width:9px;height:2px;border-radius:2px;background:currentColor}
svg.chart{width:100%;display:block;overflow:visible}
/* ---- Präzisions-Viz (Tachogramm/Poincaré/Dual) — EKG-Papier-Grid ---- */
svg.viz{width:100%;display:block;overflow:visible}
/* Cyan EKG-Papier-Grid — exakt wie die iOS-App (edle, gebrandete Signatur, NICHT weiß) */
svg.viz .grid-major,svg.chart .grid-major{stroke:#3ECFB2;stroke-opacity:.40;stroke-width:.6}
svg.viz .grid-minor,svg.chart .grid-minor{stroke:#3ECFB2;stroke-opacity:.16;stroke-width:.5}
svg.viz .axis,svg.chart .axis{stroke:#3ECFB2;stroke-opacity:.55;stroke-width:.8}
svg.viz .tick,svg.chart .tick{stroke:#3ECFB2;stroke-opacity:.55;stroke-width:.8}
svg.viz text{fill:var(--text-secondary);font-size:9px;font-family:var(--font-mono)}
svg.viz .label-axis,svg.chart .label-axis{fill:var(--text-secondary);font-size:9.5px;letter-spacing:.1em;font-family:var(--font-ui);font-weight:600}
svg.viz .label-unit,svg.chart .label-unit{fill:var(--text-dim);font-weight:400}
svg.viz .sd-lbl{fill:var(--cyan-strong);font-size:10px;font-weight:600;font-family:var(--font-ui)}
/* ---- Chart Tap-to-Zoom (Vollbild-Präzision) ---- */
.chart-wrap{position:relative}
.chart-zoombtn{position:absolute;top:8px;right:8px;z-index:3;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  background:rgba(6,16,26,.72);border:1px solid var(--border-subtle);color:var(--text-secondary);cursor:zoom-in;backdrop-filter:blur(6px);transition:color .15s,border-color .15s,background .15s}
.chart-zoombtn:hover{color:var(--cyan-strong);border-color:var(--cyan-deep);background:var(--cyan-g3)}
.chart-zoombtn svg{width:15px;height:15px}
#chartZoom{position:fixed;inset:0;z-index:300;background:rgba(2,6,10,.985);backdrop-filter:blur(14px);display:none;flex-direction:column;
  padding:calc(12px + env(safe-area-inset-top,0)) 14px calc(14px + env(safe-area-inset-bottom,0))}
#chartZoom.on{display:flex;animation:fade .25s ease}
#chartZoom .zhead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;flex-shrink:0}
#chartZoom .ztitle{font-family:var(--font-brand);font-weight:600;font-size:16px;color:var(--text-primary)}
#chartZoom .zhint{font-size:11px;color:var(--text-dim);margin-top:2px}
#chartZoom .zclose{width:40px;height:40px;border-radius:12px;background:var(--bg-elev);border:1px solid var(--border-subtle);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
#chartZoom .zclose:hover{color:var(--text-primary);border-color:var(--border-strong)}
#chartZoom .zclose svg{width:20px;height:20px}
#chartZoom .zbody{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border-faint);border-radius:var(--r-m);
  background:linear-gradient(160deg,rgba(9,22,33,.6),rgba(4,12,20,.5));display:flex;align-items:center;justify-content:center;padding:10px}
#chartZoom .zbody svg{height:auto;display:block}
#chartZoom .zbody.wide svg{min-width:820px;width:100%}
#chartZoom .zbody.square svg{max-width:min(94vw,560px);width:100%}
.viz{cursor:zoom-in}
.vm-groups{display:flex;flex-direction:column;gap:15px}
.vm-glabel{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);font-weight:700;margin-bottom:8px;padding-left:2px}
.viz-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.viz-metrics .vm{background:var(--bg-deep);border:1px solid var(--border-faint);border-radius:9px;padding:9px 11px}
.viz-metrics .vm .k{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);font-weight:600}
.viz-metrics .vm .v{font-family:var(--font-mono);font-size:17px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:2px}
.viz-metrics .vm .v small{font-size:10px;color:var(--text-secondary);font-weight:400}
.freq-row{display:grid;grid-template-columns:1fr 250px;gap:20px;align-items:start;margin-top:20px;padding-top:18px;border-top:1px solid var(--border-faint)}
.geo-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;margin-top:20px;padding-top:18px;border-top:1px solid var(--border-faint)}
@media(max-width:820px){.freq-row,.geo-row{grid-template-columns:1fr}}
.freq-spec{min-width:0}
.pwr-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.pwr{flex:1;min-width:64px;background:var(--bg-deep);border:1px solid var(--border-faint);border-radius:9px;padding:8px 10px;text-align:center}
.pwr .pk{display:block;font-size:9px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;color:var(--text-dim)}
.pwr b{font-family:var(--font-mono);font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text-primary)}
.baev-box{background:var(--bg-deep);border:1px solid var(--border-faint);border-radius:var(--r-m);padding:14px;text-align:center}
.baev-sub{font-size:10.5px;color:var(--text-secondary);line-height:1.5;margin-top:8px;font-variant-numeric:tabular-nums}
/* ---- Interaktives Zeitreihen-Chart ---- */
.ts-chart{position:relative}
.ts-chart svg{width:100%;display:block;overflow:visible;cursor:crosshair;touch-action:pan-y}
.ts-tip{position:absolute;pointer-events:none;background:var(--bg-elev-2);border:1px solid var(--border-strong);
  border-radius:10px;padding:9px 12px;font-size:12px;box-shadow:var(--shadow);opacity:0;transform:translate(-50%,-115%);
  transition:opacity .12s;z-index:20;white-space:nowrap;min-width:110px}
.ts-tip.on{opacity:1}
.ts-tip .tt-date{font-size:10px;color:var(--text-dim);letter-spacing:.04em;margin-bottom:3px}
.ts-tip .tt-val{font-family:var(--font-mono);font-size:16px;font-weight:600;letter-spacing:-.02em}
.ts-tip .tt-cls{font-size:11px;font-weight:600;margin-top:1px}
.ts-tip .tt-delta{font-size:11px;margin-top:2px;color:var(--text-secondary)}
.ts-cross{stroke:var(--cyan);stroke-width:1;stroke-dasharray:3 3;opacity:0;transition:opacity .1s}
.ts-cross.on{opacity:.5}
.ts-focus{opacity:0;transition:opacity .1s} .ts-focus.on{opacity:1}

<script>
/* ════════════════════════════════════════════════════════════════════════
   CARLON EQUINE — Applikationslogik
   Vollständig lokal · IndexedDB · keine Server-Übertragung von Gesundheitsdaten
   ════════════════════════════════════════════════════════════════════════ */
"use strict";

/* ---------- Utilities ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const num = v => (typeof v==='number'&&isFinite(v))?v:(v!=null&&!isNaN(parseFloat(v))?parseFloat(v):null);
const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt1 = v => v==null?'—':(Math.round(v*10)/10).toLocaleString('de-DE');
const fmt2 = v => v==null?'—':(Math.round(v*100)/100).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmt0 = v => v==null?'—':Math.round(v).toLocaleString('de-DE');
const fmtTime = m => { m=Math.round(m); return `${String(Math.floor(m/60)%24).padStart(2,'0')}:${String(((m%60)+60)%60).padStart(2,'0')}`; };
const parseTime = s => { const [h,mi]=(s||'').split(':').map(Number); return (isNaN(h)?8:h)*60+(isNaN(mi)?0:mi); };
const euro = v => (v==null?0:v).toLocaleString('de-DE',{style:'currency',currency:'EUR'});
function relTime(iso){
  if(!iso) return '—';
  const d=(Date.now()-new Date(iso).getTime())/1000;
  if(d<3600) return Math.max(1,Math.round(d/60))+' Min';
  if(d<86400) return Math.round(d/3600)+' Std';
  const days=Math.round(d/86400);
  if(days<31) return days+' Tg';
  if(days<365) return Math.round(days/30)+' Mon';
  return Math.round(days/365)+' J';
}
function fmtDate(iso,withTime){
  if(!iso) return '—';
  const d=new Date(iso);
  const o={day:'2-digit',month:'short',year:'numeric'};
  if(withTime){o.hour='2-digit';o.minute='2-digit';}
  return d.toLocaleString('de-DE',o);
}
function haversine(a,b){
  const R=6371,toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat),dLng=toR(b.lng-a.lng);
  const s=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function uid(){return 'x'+Math.abs(hashStr(String(performance.now())+Object.keys(DB._c||{}).length+Math.floor(performance.timeOrigin))).toString(36);}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}return h;}

/* ---------- IndexedDB layer ---------- */
const DB = {
  _db:null, _c:{},
  async open(){
    return new Promise((res,rej)=>{
      const r=indexedDB.open(location.search.includes('previewdb')?'carlon_verify':'carlon_clinic',2);
      r.onupgradeneeded=e=>{
        const db=e.target.result;
        ['horses','recordings','consults','settings','coherence'].forEach(s=>{
          if(!db.objectStoreNames.contains(s)) db.createObjectStore(s,{keyPath:'id'});
        });
      };
      r.onblocked=()=>{Toast&&Toast.show&&Toast.show('Update blockiert — bitte andere CARLON-Tabs schließen','warn');};
      r.onsuccess=e=>{this._db=e.target.result;this._db.onversionchange=()=>{try{this._db.close();}catch(_){}};res();};
      r.onerror=e=>rej(e.target.error);
    });
  },
  _tx(store,mode){return this._db.transaction(store,mode).objectStore(store);},
  all(store){return new Promise((res,rej)=>{const r=this._tx(store,'readonly').getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});},
  put(store,obj){return new Promise((res,rej)=>{try{const r=this._tx(store,'readwrite').put(obj);r.onsuccess=()=>res(obj);r.onerror=()=>{if(typeof Safe!=='undefined')Safe.writeFailed(store,r.error);rej(r.error);};}catch(e){if(typeof Safe!=='undefined')Safe.writeFailed(store,e);rej(e);}});},
  del(store,id){return new Promise((res,rej)=>{try{const r=this._tx(store,'readwrite').delete(id);r.onsuccess=()=>res();r.onerror=()=>{if(typeof Safe!=='undefined')Safe.writeFailed(store,r.error);rej(r.error);};}catch(e){if(typeof Safe!=='undefined')Safe.writeFailed(store,e);rej(e);}});},
  get(store,id){return new Promise((res,rej)=>{const r=this._tx(store,'readonly').get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});},
};
