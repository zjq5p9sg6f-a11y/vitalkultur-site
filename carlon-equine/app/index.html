const Sortable={
  bind(container,onReorder){
    if(!container||container._sortBound)return; container._sortBound=true;
    let cand=null, drag=null, ph=null, offY=0, sx=0, sy=0, pid=null, lp=null;
    let scrollEl=null, raf=null, curY=0;   // Edge-Auto-Scroll
    const EDGE=90, MAXSP=16;
    const noScroll=e=>e.preventDefault();   // blockt nativen Seiten-Scroll während des Ziehens (Touch) — wir scrollen selbst
    const others=()=>[...container.querySelectorAll('[data-sort]')].filter(x=>x!==drag);
    const scrollParent=(node)=>{ let p=node&&node.parentElement;
      while(p){ const s=getComputedStyle(p); if(/(auto|scroll)/.test(s.overflowY)&&p.scrollHeight>p.clientHeight+2) return p; p=p.parentElement; }
      return window; };
    const placePh=(clientY)=>{ let placed=false;
      for(const it of others()){ const r=it.getBoundingClientRect();
        if(clientY < r.top+r.height/2){ container.insertBefore(ph,it); placed=true; break; } }
      if(!placed) container.appendChild(ph); };
    const tick=()=>{ raf=null; if(!drag)return;
      const vh=window.innerHeight; let sp=0;
      if(curY<EDGE) sp=-Math.ceil((EDGE-Math.max(curY,0))/EDGE*MAXSP);
      else if(curY>vh-EDGE) sp=Math.ceil((Math.min(curY,vh)-(vh-EDGE))/EDGE*MAXSP);
      if(sp!==0){
        const win=scrollEl===window;
        const b=win?window.scrollY:scrollEl.scrollTop;
        if(win)window.scrollBy(0,sp); else scrollEl.scrollTop+=sp;
        const a=win?window.scrollY:scrollEl.scrollTop;
        if(a!==b){ drag.style.top=(curY-offY)+'px'; placePh(curY); }
        raf=requestAnimationFrame(tick);
      }
    };
    const begin=(item,clientY)=>{
      drag=item; scrollEl=scrollParent(container);
      const r=item.getBoundingClientRect(); offY=clientY-r.top;
      ph=document.createElement('div'); ph.className='sort-ph'; ph.style.height=r.height+'px';
      item.parentNode.insertBefore(ph,item.nextSibling);
      item.classList.add('sort-drag');
      Object.assign(item.style,{position:'fixed',width:r.width+'px',left:r.left+'px',top:r.top+'px',zIndex:'999',margin:'0',touchAction:'none'});
      document.body.style.userSelect='none'; document.body.style.webkitUserSelect='none'; document.body.style.cursor='grabbing';
      document.addEventListener('touchmove',noScroll,{passive:false});
    };
    const onMove=(e)=>{
      if(lp!=null){ // wartet auf Long-Press: frühe Bewegung = Scroll → abbrechen
        if(Math.abs(e.clientY-sy)>8||Math.abs(e.clientX-sx)>8){ clearTimeout(lp); lp=null; finish(false); }
        return;
      }
      if(!drag){
        if(cand && (Math.abs(e.clientY-sy)>5 || Math.abs(e.clientX-sx)>5)) begin(cand,e.clientY);
        else return;
      }
      e.preventDefault();
      curY=e.clientY;
      drag.style.top=(curY-offY)+'px';
      placePh(curY);
      if(!raf) raf=requestAnimationFrame(tick);   // Rand erreicht → Auto-Scroll läuft, bis Rand verlassen
    };
    const finish=(commit)=>{
      window.removeEventListener('pointermove',onMove); window.removeEventListener('pointerup',onUp);
      document.removeEventListener('touchmove',noScroll);
      if(raf){cancelAnimationFrame(raf);raf=null;}
      if(lp!=null){clearTimeout(lp);lp=null;}
      document.body.style.userSelect=''; document.body.style.webkitUserSelect=''; document.body.style.cursor='';
      cand=null;
      if(!drag)return;
      const el=drag; drag=null;
      el.classList.remove('sort-drag'); el.removeAttribute('style');
      if(ph){ container.insertBefore(el,ph); ph.remove(); ph=null; }
      if(commit) onReorder([...container.querySelectorAll('[data-sort]')].map(x=>x.dataset.sort));
    };
    const onUp=()=>finish(true);
    container.addEventListener('pointerdown',e=>{
      if(e.button&&e.button!==0)return;
      const item=e.target.closest('[data-sort]'); if(!item)return;
      const onHandle=!!e.target.closest('.tdrag');
      if(!onHandle && e.target.closest('button,a,input,select,textarea,label'))return;  // Aktionen klicken lassen
      cand=item; sx=e.clientX; sy=e.clientY; pid=e.pointerId;
      if(e.pointerType!=='mouse' && !onHandle){
        // Touch auf Kartenkörper: Long-Press (kurz halten) startet Ziehen — überall greifbar, Scroll bleibt
        lp=setTimeout(()=>{ lp=null; try{item.setPointerCapture(pid);}catch(_){} if(navigator.vibrate)navigator.vibrate(12); begin(cand,sy); },260);
      } else {
        try{item.setPointerCapture(e.pointerId);}catch(_){}
      }
      window.addEventListener('pointermove',onMove);
      window.addEventListener('pointerup',onUp);
    });
  }
};
const ChartZoom={
  enhance(){
    const main=$('#main'); if(!main) return;
    main.querySelectorAll('.chart-wrap, .viz').forEach(node=>{
      let host,svg;
      if(node.classList.contains('viz')){svg=node;host=node.parentElement;}
      else{host=node;svg=node.querySelector('svg.viz,svg.chart');}
      if(!svg||!host||host.querySelector(':scope > .chart-zoombtn'))return;
      if(getComputedStyle(host).position==='static')host.style.position='relative';
      // Interaktive Charts (.viz-hov: Poincaré/Tachogramm/Dual/Spektrum): KEIN Tap-zum-Vollbild —
      // sonst öffnet auf dem iPhone jeder Tap das Vollbild statt den Wert zu zeigen. Vollbild via Expand-Button.
      if(svg.classList.contains('viz') && !svg.closest('.viz-hov')){svg.style.cursor='zoom-in';svg.addEventListener('click',()=>ChartZoom.open(svg,host));}
      const b=document.createElement('button');
      b.className='chart-zoombtn';b.title='Vergrößern';b.innerHTML=IC.expand;
      b.addEventListener('click',e=>{e.stopPropagation();ChartZoom.open(svg,host);});
      host.appendChild(b);
    });
  },
  open(svg,host){
    const clone=svg.cloneNode(true);clone.removeAttribute('style');clone.style.cursor='default';
    const vb=(svg.getAttribute('viewBox')||'0 0 700 400').split(/\s+/).map(Number);
    const wide=(vb[2]/vb[3])>1.4;
    const body=$('#zoomBody');body.className='zbody '+(wide?'wide':'square');body.innerHTML='';body.appendChild(clone);
    const t=(host.querySelector('.ct span')||{}).textContent||(host.previousElementSibling&&host.previousElementSibling.textContent)||'Signalanalyse';
    $('#zoomTitle').textContent=String(t).trim().slice(0,60);
    $('#zoomHint').style.display=wide?'':'none';
    $('#chartZoom').classList.add('on');document.body.style.overflow='hidden';
  },
  close(){$('#chartZoom').classList.remove('on');document.body.style.overflow='';}
};
document.addEventListener('keydown',e=>{if(e.key==='Escape')ChartZoom.close();});

const Nav={
  cur:'today',
  go(tab){this.cur=tab;
    const match=b=>b.dataset.tab===tab||(tab==='detail'&&b.dataset.tab==='roster')||(['cohdetail','pairdetail'].includes(tab)&&b.dataset.tab==='coherence');
    $$('#tabs button').forEach(b=>b.classList.toggle('on',match(b)));
    $$('#bottomNav button').forEach(b=>b.classList.toggle('on',match(b)));
    this.render();const m=$('#main');if(m)m.scrollTop=0;window.scrollTo(0,0);},
  render(){
    const enterToday=(this.cur==='today' && this._lastCur!=='today');
    const map={today:Views.today,board:Views.board,station:Views.station,map:Views.map,roster:Views.roster,detail:Views.detail,revenue:Views.revenue,logbook:Views.logbook,coherence:Views.coherence,cohdetail:Views.coherenceDetail,pairdetail:Views.pairDetail};
    $('#main').innerHTML=(map[this.cur]||Views.today).call(Views);
    if(this.cur==='map')setTimeout(()=>Dispatch.render(),60);
    ChartZoom.enhance();Chart.initVizHover&&Chart.initVizHover();
    clearInterval(Views._tlTimer); Views._tlTimer=null;
    if(this.cur==='today'){
      Sortable.bind($('#todayStops'),ids=>Views.applyManualOrder(ids));
      Views.tickTimeline();
      Views._tlTimer=setInterval(()=>Views.tickTimeline(),30000);
      if(enterToday) setTimeout(()=>{ // Sticky-Jetzt-Stopp: beim Öffnen direkt zum aktuellen Stopp (Sim-Hebel #1)
        const nx=$('#todayStops .tstop.next'), first=$('#todayStops .tstop');
        if(nx && nx!==first) nx.scrollIntoView({block:'center',behavior:'smooth'});
      },100);
    }
    this._lastCur=this.cur;
    this.updateBadges();
  },
  refresh(){this.render();},
  updateBadges(){
    const crit=State.horses.filter(h=>{const r=State.latestFor(h.id);return r&&r.triage&&r.triage.level==='crit';}).length;
    [$('#critBadge'),$('#critBadgeM')].forEach(cb=>{if(cb){cb.textContent=crit;cb.classList.toggle('hidden',!crit);}});
    const hb=$('#horseBadge');if(hb){hb.textContent=State.horses.length;hb.classList.toggle('hidden',!State.horses.length);}
    const tp=$('#tierPill'),tl=$('#tierLabel');
    if(tp&&tl){const paid=License.isPaid();const t=License.TIERS[License.tier()];const rn=License.needsRenewal();
      const fnd=License.isFounder()||(rn&&rn.founder);
      if(rn&&rn.state==='expired'){ tl.textContent=(fnd?'Partner':'Lizenz')+' abgelaufen · verlängern'; tp.className='tier-pill expired'; tp.setAttribute('onclick','License.renew()'); }
      else if(rn&&rn.state==='expiring'){ tl.textContent=(t.name)+' · läuft in '+rn.days+'d ab'; tp.className='tier-pill expiring'; tp.setAttribute('onclick','License.renew()'); }
      else { tl.textContent=License.isTrial()?('Test · '+License.daysLeft()+' Tage'):(paid?(fnd?'Gründungs-Partner':t.name):'Demo · freischalten'); tp.className='tier-pill '+(paid?'paid':'demo'); tp.setAttribute('onclick','License.isPaid()?UI.licenseInfo():UI.upgrade()'); }}
  }
};

/* ════════════════════════════════════════════════════════════════════════
   BOOT
   ════════════════════════════════════════════════════════════════════════ */
/* ════════════════════════════════════════════════════════════════════════
   PWA — Installierbarkeit + robuste Persistenz
   ════════════════════════════════════════════════════════════════════════ */
const Persist={
  async status(){try{return navigator.storage&&navigator.storage.persisted?await navigator.storage.persisted():false;}catch(e){return false;}},
  async request(){try{if(navigator.storage&&navigator.storage.persist)return await navigator.storage.persist();}catch(e){}return false;},
  async estimate(){try{if(navigator.storage&&navigator.storage.estimate)return await navigator.storage.estimate();}catch(e){}return null;},
};
/* ── Safe · Datensicherheit: nie Datenverlust durch die App ── */
const Safe={
  writeFailed(store,err){
    console.error('[CARLON] Schreibfehler in '+store,err);
    document.body.classList.add('data-risk');
    Toast.show('⚠ Speichern fehlgeschlagen — bitte sofort ein Backup exportieren','warn',{label:'Backup',fn:()=>Backup.doExport()});
    this.renderBanner();   // Notfall zeigt das Banner auch bei aktivem Snooze
  },
  markBackup(){ if(State.settings){State.settings.lastBackupAt=new Date().toISOString(); State.saveSettings();} this.renderBanner(); },
  backupAgeDays(){ const t=State.settings&&State.settings.lastBackupAt; if(!t)return Infinity; return (Date.now()-new Date(t).getTime())/86400000; },
  async check(){
    let persisted=false, est=null;
    try{ persisted=await Persist.status(); est=await Persist.estimate(); }catch(e){}
    const age=this.backupAgeDays();
    const hasData=(State.horses&&State.horses.length>0)||(State.recordings&&State.recordings.length>0);
    const quotaPct=(est&&est.quota)?Math.round(est.usage/est.quota*100):0;
    const standalone=(typeof PWA!=='undefined'&&PWA.standalone&&PWA.standalone());
    return {persisted,quotaPct,age,hasData,standalone};
  },
  async renderBanner(){
    const el=$('#safeBanner'); if(!el)return;
    const c=await this.check(); const risks=[]; const wants=new Set();
    const hardFail=document.body.classList.contains('data-risk');
    let urgent=hardFail;
    if(hardFail){ risks.push('Speichern ist zuletzt fehlgeschlagen — bitte jetzt ein Backup sichern.'); wants.add('backup'); }
    if(c.hasData&&!c.persisted){
      if(c.standalone){ risks.push('Dein Browser garantiert keinen dauerhaften Speicher — sichere regelmäßig per Backup.'); wants.add('backup'); }
      else { risks.push('Speicher noch nicht dauerhaft — als App installieren schützt vor Löschen nach ~7 Tagen.'); wants.add('install'); wants.add('backup'); }
    }
    if(c.hasData&&c.age>7){ risks.push(c.age===Infinity?'Noch kein Backup erstellt.':`Letztes Backup vor ${Math.round(c.age)} Tagen.`); wants.add('backup'); }
    if(c.quotaPct>=85){ risks.push(`Lokaler Speicher zu ${c.quotaPct}% voll.`); wants.add('backup'); urgent=true; }
    if(!risks.length){ el.style.display='none'; return; }
    // Weiche Ermahnung ist wegklickbar (7-Tage-Snooze). Notfall (Schreibfehler / voller Speicher) NICHT.
    const snoozed=State.settings&&State.settings.safeSnoozeUntil&&Date.now()<State.settings.safeSnoozeUntil;
    if(snoozed&&!urgent){ el.style.display='none'; return; }
    el.style.display='';
    el.classList.toggle('urgent',urgent);
    el.innerHTML=`<div class="sb-in">
      <svg class="sb-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>
      <div class="sb-txt"><b>Datensicherheit:</b> ${esc(risks.join(' '))}</div>
      ${wants.has('install')?`<button class="sb-btn primary" onclick="PWA.install()">Als App sichern</button>`:''}
      ${wants.has('backup')?`<button class="sb-btn" onclick="Backup.doExport()">Backup jetzt</button>`:''}
      ${urgent?'':`<button class="sb-x" onclick="Safe.snooze()" title="Ausblenden — Status bleibt in den Einstellungen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>`}
    </div>`;
  },
  snooze(){
    if(State.settings){ State.settings.safeSnoozeUntil=Date.now()+7*86400000; State.saveSettings(); }
    const el=$('#safeBanner'); if(el)el.style.display='none';
    Toast.show('Hinweis für 7 Tage ausgeblendet — Datensicherheit bleibt in den Einstellungen','info');
  }
};
const PWA={
  deferred:null,
  iOS(){return /iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.MSStream;},
  iPadDesktop(){return navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1;},
  standalone(){return matchMedia('(display-mode: standalone)').matches||navigator.standalone===true;},
  async register(){if('serviceWorker' in navigator){try{await navigator.serviceWorker.register('sw.js');}catch(e){}}},
  async install(){
    if(this.deferred){this.deferred.prompt();const r=await this.deferred.userChoice;this.deferred=null;
      if(r&&r.outcome==='accepted'){await Persist.request();Toast.show('CARLON EQUINE installiert','ok');}return;}
    if(this.iOS()||this.iPadDesktop()){UI.iosInstall();return;}
    Toast.show('Im Browser-Menü „Installieren" / „Zum Startbildschirm hinzufügen" wählen','info');
  },
};
addEventListener('beforeinstallprompt',e=>{e.preventDefault();PWA.deferred=e;});

(async function boot(){
  try{
    await DB.open();
    PWA.register();
    // Datenverlust-Schutz: iOS/Safari löscht IndexedDB nach ~7 Tagen Nichtnutzung (ITP).
    // Persistenz anfordern, damit klinische Daten erhalten bleiben.
    try{ if(navigator.storage&&navigator.storage.persist){ const already=await navigator.storage.persisted?.(); if(!already) await navigator.storage.persist(); } }catch(e){}
    await State.load();
    // Einmal-Bereinigung: englische Klinik-Zusätze in Klammern aus alten Demo-Namen strippen
    if(!State.settings.seedNamesCleaned){
      for(const h of State.horses){ const mm=h.name&&h.name.match(/^(.+?)\s*\([^)]*\)\s*$/); if(mm){h.name=mm[1].trim(); await DB.put('horses',h);} }
      State.settings.seedNamesCleaned=true; await State.saveSettings();
    }
    await License.loadFromSettings();
    if(State.settings.fieldMode){document.body.classList.add('field-mode');const b=$('#fieldBtn');if(b)b.classList.add('on');}
    Chart.initHover();
    Nav.go(Nav.cur);
    Safe.renderBanner();
    // Nahtlose Verlängerung: kein stiller Cliff — bei Ablauf/baldigem Ablauf freundlich erinnern (Daten bleiben erhalten)
    {const rn=License.needsRenewal(); if(rn){ const founder=rn.founder||License.isFounder();
      const msg=rn.state==='expired'
        ? (founder?'Deine Gründungs-Partner-Freischaltung ist abgelaufen — deine Daten bleiben erhalten. Jetzt verlängern.':'Deine Lizenz ist abgelaufen — deine Daten bleiben erhalten. Jetzt verlängern.')
        : `Deine Freischaltung läuft in ${rn.days} Tag${rn.days!==1?'en':''} ab — jetzt verlängern.`;
      setTimeout(()=>Toast.show(msg,rn.state==='expired'?'warn':'info',{label:'Verlängern',fn:()=>License.renew()}),800); }}
    // Geteilte/übergebene Aufnahme direkt aufgreifen (Share-Target / File-Handler / Shortcut)
    {const _p=new URLSearchParams(location.search);
      if(_p.has('shared')) setTimeout(()=>Importer.consumeShared(),300);
      else if(_p.has('import')||_p.has('open')) setTimeout(()=>Importer.open(),300);}
    // Persistenz nochmals nach erster Nutzer-Interaktion anfordern (wird dann eher gewährt) + Banner aktualisieren
    addEventListener('pointerdown',async function pOnce(){ removeEventListener('pointerdown',pOnce);
      try{ if(!(await Persist.status())) await Persist.request(); }catch(e){} Safe.renderBanner(); },{once:true});
    // Nie stiller Datenverlust: unbehandelte DB-Schreibfehler laut melden
    addEventListener('unhandledrejection',e=>{ const m=(e.reason&&(e.reason.name||e.reason.message)||'')+''; if(/quota|abort|constraint|InvalidState|Unknown|Transaction|Data/i.test(m)){ Safe.writeFailed('unbekannt',e.reason);} });
    // Tab-Klicks
    $$('#tabs button, #bottomNav button').forEach(b=>b.addEventListener('click',()=>Nav.go(b.dataset.tab)));
    // Splash aus, App an
    setTimeout(()=>{$('#splash').classList.add('gone');$('#app').classList.add('ready');
      const params=new URLSearchParams(location.search);
      if(params.get('trial')&&License.trialAvailable()){License.startTrial().then(()=>{if(!State.horses.length)Seed.load();});}
      else if(!State.settings.onboarded && !State.horses.length) showTour();
    },700);
  }catch(e){
    console.error(e);
    $('#splash').innerHTML=`<div style="color:var(--red);text-align:center;padding:20px">Startfehler: ${esc(e.message)}<br><br>Bitte Seite neu laden.</div>`;
  }
})();
</script>
